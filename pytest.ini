[tool:pytest]
minversion = 6.0
addopts = -ra -q --strict-markers --strict-config
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    property: marks tests as property-based tests
    shell: marks tests as shell script tests
    mutation: marks tests as mutation testing targets
    coverage: marks tests for coverage analysis
asyncio_mode = auto

[tool:coverage:run]
source = tui,bin
omit =
    */tests/*
    */__pycache__/*
    .venv/*
    */migrations/*
    */venv/*
    setup.py

[tool:coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

precision = 2
show_missing = true
skip_covered = false

[tool:coverage:html]
directory = tests/coverage/htmlcov

[tool:coverage:xml]
output = tests/coverage/coverage.xml