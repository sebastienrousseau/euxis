<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Euxis Gateway WebChat</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; display: flex; height: 100vh; }
    #sidebar { width: 340px; border-right: 1px solid #ddd; padding: 1rem; overflow: auto; }
    #main { flex: 1; padding: 1rem; display: flex; flex-direction: column; }
    #log { border: 1px solid #ddd; padding: 1rem; flex: 1; overflow: auto; background: #fff; }
    .log-item { padding: 0.35rem 0; border-bottom: 1px solid #f0f0f0; }
    .log-item:last-child { border-bottom: none; }
    .log-meta { font-size: 0.75rem; color: #666; text-transform: uppercase; letter-spacing: 0.04em; }
    .log-body { font-size: 0.95rem; color: #111; }
    .log-code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.85rem; white-space: pre-wrap; }
    #controls { margin-top: 1rem; display: flex; gap: 0.5rem; }
    #canvas { border: 1px dashed #bbb; padding: 0.75rem; margin-top: 1rem; background: #fafafa; }
    #canvas pre { white-space: pre-wrap; font-size: 0.85rem; }
    textarea { width: 100%; height: 120px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    input { flex: 1; padding: 0.5rem; }
    button { padding: 0.5rem 1rem; }
    h2 { margin-top: 1rem; }
    .list { font-size: 0.9rem; }
    .item { padding: 0.25rem 0; border-bottom: 1px solid #f0f0f0; }
    .item small { color: #666; display: block; }
    .inline { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
    .badge { background: #eef2ff; color: #3730a3; border-radius: 999px; padding: 0.1rem 0.6rem; font-size: 0.75rem; }
  </style>
</head>
<body>
  <div id="sidebar">
    <h1>Gateway WebChat</h1>
    <label>Token</label>
    <input id="token" placeholder="token (optional)" />
    <h2>Sessions</h2>
    <div id="sessions" class="list"></div>
    <h2>Current Route</h2>
    <div id="route" class="list">None</div>
    <h2>Trace</h2>
    <div id="trace" class="list"></div>
    <h2>Session Details</h2>
    <div id="session-meta" class="list"></div>
    <h2>Approvals</h2>
    <div id="approvals" class="list"></div>
    <div id="exports" class="list">
      <button id="copy-export">Copy Session Export</button>
      <button id="copy-session">Copy Current Session</button>
    </div>
  </div>
  <div id="main">
    <div class="inline" style="margin-bottom: 0.75rem;">
      <span class="badge">Transcript</span>
      <button id="clear-log">Clear Log</button>
      <label for="log-filter">Filter</label>
      <select id="log-filter">
        <option value="all">All</option>
        <option value="agent">Agent</option>
        <option value="event">Events</option>
        <option value="error">Errors</option>
      </select>
    </div>
    <div id="log"></div>
    <div id="canvas">
      <h2>Canvas State</h2>
      <pre id="canvas-view">{}</pre>
      <textarea id="canvas-editor" placeholder='{"view":"dashboard","widgets":[{"type":"card","title":"Status","body":"OK"}]}'></textarea>
      <button id="canvas-save">Save Canvas</button>
      <button id="canvas-refresh">Refresh Canvas</button>
      <div id="canvas-render"></div>
    </div>
    <div id="controls">
      <input id="session" placeholder="session_id" value="sess_webchat_demo" />
      <input id="message" placeholder="Type a message" />
      <button id="send">Send</button>
    </div>
  </div>
  <script>
    const log = document.getElementById('log');
    const tokenInput = document.getElementById('token');
    const sessionInput = document.getElementById('session');
    const messageInput = document.getElementById('message');
    const sendBtn = document.getElementById('send');
    const sessionsEl = document.getElementById('sessions');
    const approvalsEl = document.getElementById('approvals');
    const routeEl = document.getElementById('route');
    const traceEl = document.getElementById('trace');
    const sessionMetaEl = document.getElementById('session-meta');
    const copyExportBtn = document.getElementById('copy-export');
    const copySessionBtn = document.getElementById('copy-session');
    const clearLogBtn = document.getElementById('clear-log');
    const logFilter = document.getElementById('log-filter');
    const canvasView = document.getElementById('canvas-view');
    const canvasEditor = document.getElementById('canvas-editor');
    const canvasSave = document.getElementById('canvas-save');
    const canvasRefresh = document.getElementById('canvas-refresh');
    const canvasRender = document.getElementById('canvas-render');

    const params = new URLSearchParams(window.location.search);
    if (params.get('token')) {
      tokenInput.value = params.get('token');
    }

    function wsUrl() {
      const token = tokenInput.value.trim();
      if (!token) return `ws://${location.host}/`;
      return `ws://${location.host}/?token=${encodeURIComponent(token)}`;
    }

    let ws = new WebSocket(wsUrl());
    const traceState = new Map();
    let logFilterValue = 'all';

    function sendConnect() {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      const payload = {
        type: 'request',
        id: `req_connect_${Date.now()}`,
        method: 'gateway.connect',
        params: { protocol: 'v0.1', client_id: 'webchat' }
      };
      ws.send(JSON.stringify(payload));
    }

    ws.onopen = () => {
      sendConnect();
    };

    function shouldRender(kind) {
      if (logFilterValue === 'all') return true;
      if (logFilterValue === 'agent') return kind === 'agent';
      if (logFilterValue === 'event') return kind === 'event' || kind === 'presence' || kind === 'tick';
      if (logFilterValue === 'error') return kind === 'error';
      return true;
    }

    function renderLogItem(kind, title, body, meta) {
      if (!shouldRender(kind)) return;
      const wrapper = document.createElement('div');
      wrapper.className = 'log-item';
      const metaEl = document.createElement('div');
      metaEl.className = 'log-meta';
      metaEl.textContent = meta || kind;
      const bodyEl = document.createElement('div');
      bodyEl.className = 'log-body';
      bodyEl.textContent = title || '';
      if (body) {
        const bodyDetail = document.createElement('div');
        bodyDetail.className = 'log-code';
        bodyDetail.textContent = body;
        bodyEl.appendChild(bodyDetail);
      }
      wrapper.appendChild(metaEl);
      wrapper.appendChild(bodyEl);
      log.appendChild(wrapper);
      log.scrollTop = log.scrollHeight;
    }

    function formatEvent(data) {
      if (!data || typeof data !== 'object') {
        return { kind: 'raw', title: String(data || ''), body: '' };
      }
      if (data.type === 'event') {
        const evt = data.event || 'event';
        const seq = data.seq ? `#${data.seq}` : '';
        if (evt === 'agent') {
          const payload = data.data || {};
          const agent = payload.agent_id || 'agent';
          const status = payload.status || 'update';
          const content = payload.content || '';
          return {
            kind: 'agent',
            title: `${agent} · ${status}`,
            body: content,
            meta: `agent ${seq}`.trim(),
          };
        }
        return {
          kind: evt === 'agent' ? 'agent' : 'event',
          title: `${evt} ${seq}`.trim(),
          body: JSON.stringify(data.data || {}, null, 2),
          meta: evt,
        };
      }
      if (data.type === 'response') {
        if (data.ok) {
          return {
            kind: 'response',
            title: 'Request acknowledged',
            body: JSON.stringify(data.result || {}, null, 2),
            meta: `response ${data.id || ''}`.trim(),
          };
        }
        return {
          kind: 'error',
          title: data.error?.message || 'Request failed',
          body: JSON.stringify(data.error || {}, null, 2),
          meta: `error ${data.id || ''}`.trim(),
        };
      }
      if (data.type === 'request') {
        return {
          kind: 'request',
          title: `${data.method || 'request'}`,
          body: JSON.stringify(data.params || {}, null, 2),
          meta: `request ${data.id || ''}`.trim(),
        };
      }
      return { kind: 'raw', title: JSON.stringify(data), body: '' };
    }

    ws.onmessage = (evt) => {
      let parsed = null;
      try {
        parsed = JSON.parse(evt.data);
      } catch (err) {
        parsed = null;
      }
      if (!parsed) {
        renderLogItem('raw', evt.data, '', 'raw');
        return;
      }
      if (parsed.type === 'event' && parsed.event === 'agent') {
        const payload = parsed.data || {};
        const runId = payload.run_id || 'unknown';
        traceState.set(runId, {
          run_id: runId,
          agent_id: payload.agent_id || 'agent',
          status: payload.status || 'stream',
          ts: parsed.ts || '',
        });
        renderTrace();
      }
      const formatted = formatEvent(parsed);
      renderLogItem(formatted.kind, formatted.title, formatted.body, formatted.meta);
    };

    ws.onclose = () => {
      const line = document.createElement('div');
      line.textContent = '[webchat] disconnected';
      log.appendChild(line);
    };

    tokenInput.addEventListener('change', () => {
      if (ws) ws.close();
      ws = new WebSocket(wsUrl());
      ws.onopen = () => {
        sendConnect();
      };
    });

    sendBtn.onclick = () => {
      const payload = {
        type: 'request',
        id: `req_${Date.now()}`,
        method: 'chat.send',
        params: {
          session_id: sessionInput.value,
          channel_id: 'webchat',
          role: 'user',
          content: messageInput.value,
          meta: { agent: 'architect', approved: true, elevated: 'full' }
        }
      };
      ws.send(JSON.stringify(payload));
      messageInput.value = '';
    };

    window.addEventListener('keydown', (evt) => {
      if (evt.key === 'Enter') {
        sendBtn.click();
      }
    });

    async function refreshSessions() {
      const res = await fetch('/sessions');
      const data = await res.json();
      sessionsEl.innerHTML = '';
      (data.sessions || []).forEach((s) => {
        const div = document.createElement('div');
        div.className = 'item';
        div.textContent = `${s.session_id} (${s.message_count})`;
        div.onclick = () => { sessionInput.value = s.session_id; };
        sessionsEl.appendChild(div);
      });
      const current = (data.sessions || []).find((s) => s.session_id === sessionInput.value);
      if (current && current.meta) {
        const owner = current.meta.owner || 'unknown';
        const channel = current.meta.channel_id || 'webchat';
        const scope = current.meta.scope || 'dm';
        routeEl.textContent = `${owner} via ${channel} (${scope})`;
        renderSessionMeta(current.meta, current.message_count || 0);
      } else {
        routeEl.textContent = 'None';
        sessionMetaEl.textContent = 'No session selected.';
      }
    }

    async function refreshApprovals() {
      const res = await fetch('/approvals');
      const data = await res.json();
      approvalsEl.innerHTML = '';
      (data.pending || []).forEach((a) => {
        const div = document.createElement('div');
        div.className = 'item';
        const content = (a.content || '').trim();
        const snippet = content.length > 80 ? `${content.slice(0, 80)}...` : content;
        const context = snippet || 'Execution approval requested';
        div.textContent = `${a.agent_id}: ${context}`;
        if (a.requested_at) {
          const stamp = document.createElement('small');
          stamp.textContent = a.requested_at;
          div.appendChild(stamp);
        }
        const approve = document.createElement('button');
        approve.textContent = 'Approve';
        approve.onclick = async () => {
          await fetch(`/approvals/${a.run_id}/approve`, { method: 'POST' });
          refreshApprovals();
        };
        const reject = document.createElement('button');
        reject.textContent = 'Reject';
        reject.onclick = async () => {
          await fetch(`/approvals/${a.run_id}/reject`, { method: 'POST' });
          refreshApprovals();
        };
        div.appendChild(approve);
        div.appendChild(reject);
        approvalsEl.appendChild(div);
      });
    }

    function renderCanvas(state) {
      canvasRender.innerHTML = '';
      const widgets = (state && state.widgets) || [];
      widgets.forEach((widget) => {
        if (widget.type === 'card') {
          const card = document.createElement('div');
          card.style.border = '1px solid #ddd';
          card.style.padding = '0.5rem';
          card.style.marginTop = '0.5rem';
          const title = document.createElement('strong');
          title.textContent = widget.title || 'Card';
          const body = document.createElement('div');
          body.textContent = widget.body || '';
          card.appendChild(title);
          card.appendChild(body);
          canvasRender.appendChild(card);
        } else if (widget.type === 'metric') {
          const row = document.createElement('div');
          row.style.marginTop = '0.5rem';
          const label = document.createElement('strong');
          label.textContent = widget.label || 'Metric';
          const value = document.createElement('div');
          value.textContent = String(widget.value ?? '');
          row.appendChild(label);
          row.appendChild(value);
          canvasRender.appendChild(row);
        } else if (widget.type === 'list') {
          const list = document.createElement('ul');
          (widget.items || []).forEach((item) => {
            const li = document.createElement('li');
            li.textContent = String(item);
            list.appendChild(li);
          });
          canvasRender.appendChild(list);
        } else if (widget.type === 'progress') {
          const bar = document.createElement('div');
          bar.style.border = '1px solid #ccc';
          bar.style.marginTop = '0.5rem';
          const fill = document.createElement('div');
          const pct = Math.max(0, Math.min(100, widget.percent || 0));
          fill.style.width = `${pct}%`;
          fill.style.height = '8px';
          fill.style.background = '#4a90e2';
          bar.appendChild(fill);
          canvasRender.appendChild(bar);
        } else if (widget.type === 'text') {
          const p = document.createElement('div');
          p.textContent = widget.text || '';
          canvasRender.appendChild(p);
        } else if (widget.type === 'code') {
          const pre = document.createElement('pre');
          pre.textContent = widget.code || '';
          canvasRender.appendChild(pre);
        }
      });
    }

    async function refreshCanvas() {
      const sessionId = sessionInput.value.trim();
      if (!sessionId) return;
      const res = await fetch(`/canvas/${encodeURIComponent(sessionId)}`);
      const data = await res.json();
      canvasView.textContent = JSON.stringify(data.state || {}, null, 2);
      renderCanvas(data.state || {});
    }

    canvasSave.onclick = async () => {
      const sessionId = sessionInput.value.trim();
      if (!sessionId) return;
      let state = {};
      try {
        state = JSON.parse(canvasEditor.value || '{}');
      } catch (err) {
        alert('Invalid JSON');
        return;
      }
      await fetch(`/canvas/${encodeURIComponent(sessionId)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ state })
      });
      refreshCanvas();
    };

    canvasRefresh.onclick = refreshCanvas;

    setInterval(refreshSessions, 3000);
    setInterval(refreshApprovals, 3000);
    setInterval(refreshCanvas, 5000);
    refreshSessions();
    refreshApprovals();
    refreshCanvas();

    function renderTrace() {
      traceEl.innerHTML = '';
      const items = Array.from(traceState.values()).slice(-20);
      items.reverse().forEach((t) => {
        const div = document.createElement('div');
        div.className = 'item';
        div.textContent = `${t.agent_id} · ${t.status}`;
        const stamp = document.createElement('small');
        stamp.textContent = t.run_id;
        div.appendChild(stamp);
        traceEl.appendChild(div);
      });
    }

    function renderSessionMeta(meta, messageCount) {
      sessionMetaEl.innerHTML = '';
      const fields = [
        ['Session', meta.session_id || sessionInput.value],
        ['Channel', meta.channel_id || 'webchat'],
        ['Owner', meta.owner || 'unknown'],
        ['Scope', meta.scope || 'dm'],
        ['Messages', String(messageCount)],
        ['Updated', meta.updated_at || ''],
      ];
      fields.forEach(([label, value]) => {
        const row = document.createElement('div');
        row.className = 'item';
        row.textContent = `${label}: ${value}`;
        sessionMetaEl.appendChild(row);
      });
    }

    logFilter.addEventListener('change', () => {
      logFilterValue = logFilter.value;
      log.innerHTML = '';
    });

    clearLogBtn.onclick = () => {
      log.innerHTML = '';
    };

    sessionInput.addEventListener('change', () => {
      refreshSessions();
      refreshCanvas();
    });

    copyExportBtn.onclick = async () => {
      try {
        const res = await fetch('/sessions/export');
        const data = await res.json();
        const payload = JSON.stringify(data, null, 2);
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(payload);
          alert('Session export copied to clipboard.');
          return;
        }
        const temp = document.createElement('textarea');
        temp.value = payload;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand('copy');
        temp.remove();
        alert('Session export copied to clipboard.');
      } catch (err) {
        alert('Failed to copy export.');
      }
    };

    copySessionBtn.onclick = async () => {
      const sessionId = sessionInput.value.trim();
      if (!sessionId) {
        alert('No session selected.');
        return;
      }
      try {
        const res = await fetch(`/sessions/${encodeURIComponent(sessionId)}`);
        const data = await res.json();
        const payload = JSON.stringify(data, null, 2);
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(payload);
          alert('Session copied to clipboard.');
          return;
        }
        const temp = document.createElement('textarea');
        temp.value = payload;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand('copy');
        temp.remove();
        alert('Session copied to clipboard.');
      } catch (err) {
        alert('Failed to copy session.');
      }
    };
  </script>
</body>
</html>
