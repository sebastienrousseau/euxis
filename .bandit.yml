# Bandit Security Configuration
# https://bandit.readthedocs.io/en/latest/config.html

# Global settings
targets: ['src', 'lib', 'euxis-*/src']

# Exclude paths that contain test code or generated files
exclude_dirs:
  - '/tests/'
  - '/test/'
  - '*/tests/*'
  - '*/test/*'
  - '/build/'
  - '/dist/'
  - '/__pycache__/'
  - '/.pytest_cache/'
  - '/venv/'
  - '/.venv/'
  - '/node_modules/'

# Exclude specific files
exclude:
  - '*/conftest.py'
  - '*/setup.py'
  - '*_test.py'
  - 'test_*.py'

# Skip specific security checks that are false positives or acceptable risks
skips:
  # B101: Test for use of assert - acceptable in test code
  # B601: Shell injection via subprocess - we validate inputs
  # B603: Shell injection via subprocess without shell=True - acceptable for controlled inputs

# Tests to run (empty means run all except skipped)
tests: []

# Confidence levels: LOW, MEDIUM, HIGH
confidence: MEDIUM

# Severity levels to report: LOW, MEDIUM, HIGH
level: MEDIUM

# Output format options: csv, custom, html, json, screen, txt, xml, yaml
format: json

# Additional context lines to show around issues
context_lines: 3

# Custom message template for findings
msg_template: "{abspath}:{line}: [{test_id}:{severity}] {msg}"

# Plugin settings
plugins:
  - bandit.plugins.injection_shell
  - bandit.plugins.injection_sql
  - bandit.plugins.crypto_request_no_cert_validation
  - bandit.plugins.hashlib_new_insecure_functions
  - bandit.plugins.hardcoded_password_default
  - bandit.plugins.hardcoded_password_funcarg
  - bandit.plugins.hardcoded_password_string
  - bandit.plugins.exec_as_root
  - bandit.plugins.request_with_no_cert_validation

# Custom rules for project-specific security requirements
assert_used:
  skips: ['*/test*', '*/conftest.py']