<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Euxis Gateway WebChat</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; display: flex; height: 100vh; }
    #sidebar { width: 320px; border-right: 1px solid #ddd; padding: 1rem; overflow: auto; }
    #main { flex: 1; padding: 1rem; display: flex; flex-direction: column; }
    #log { border: 1px solid #ddd; padding: 1rem; flex: 1; overflow: auto; }
    #controls { margin-top: 1rem; display: flex; gap: 0.5rem; }
    #canvas { border: 1px dashed #bbb; padding: 0.75rem; margin-top: 1rem; background: #fafafa; }
    #canvas pre { white-space: pre-wrap; font-size: 0.85rem; }
    textarea { width: 100%; height: 120px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    input { flex: 1; padding: 0.5rem; }
    button { padding: 0.5rem 1rem; }
    h2 { margin-top: 1rem; }
    .list { font-size: 0.9rem; }
    .item { padding: 0.25rem 0; border-bottom: 1px solid #f0f0f0; }
  </style>
</head>
<body>
  <div id="sidebar">
    <h1>Gateway WebChat</h1>
    <label>Token</label>
    <input id="token" placeholder="token (optional)" />
    <h2>Sessions</h2>
    <div id="sessions" class="list"></div>
    <h2>Approvals</h2>
    <div id="approvals" class="list"></div>
  </div>
  <div id="main">
    <div id="log"></div>
    <div id="canvas">
      <h2>Canvas State</h2>
      <pre id="canvas-view">{}</pre>
      <textarea id="canvas-editor" placeholder='{"view":"dashboard","widgets":[{"type":"card","title":"Status","body":"OK"}]}'></textarea>
      <button id="canvas-save">Save Canvas</button>
      <button id="canvas-refresh">Refresh Canvas</button>
      <div id="canvas-render"></div>
    </div>
    <div id="controls">
      <input id="session" placeholder="session_id" value="sess_webchat_demo" />
      <input id="message" placeholder="Type a message" />
      <button id="send">Send</button>
    </div>
  </div>
  <script>
    const log = document.getElementById('log');
    const tokenInput = document.getElementById('token');
    const sessionInput = document.getElementById('session');
    const messageInput = document.getElementById('message');
    const sendBtn = document.getElementById('send');
    const sessionsEl = document.getElementById('sessions');
    const approvalsEl = document.getElementById('approvals');
    const canvasView = document.getElementById('canvas-view');
    const canvasEditor = document.getElementById('canvas-editor');
    const canvasSave = document.getElementById('canvas-save');
    const canvasRefresh = document.getElementById('canvas-refresh');
    const canvasRender = document.getElementById('canvas-render');

    const params = new URLSearchParams(window.location.search);
    if (params.get('token')) {
      tokenInput.value = params.get('token');
    }

    function wsUrl() {
      const token = tokenInput.value.trim();
      if (!token) return `ws://${location.host}/`;
      return `ws://${location.host}/?token=${encodeURIComponent(token)}`;
    }

    let ws = new WebSocket(wsUrl());

    function sendConnect() {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      const payload = {
        type: 'request',
        id: `req_connect_${Date.now()}`,
        method: 'gateway.connect',
        params: { protocol: 'v0.1', client_id: 'webchat' }
      };
      ws.send(JSON.stringify(payload));
    }

    ws.onopen = () => {
      sendConnect();
    };

    ws.onmessage = (evt) => {
      const line = document.createElement('div');
      line.textContent = evt.data;
      log.appendChild(line);
      log.scrollTop = log.scrollHeight;
    };

    ws.onclose = () => {
      const line = document.createElement('div');
      line.textContent = '[webchat] disconnected';
      log.appendChild(line);
    };

    tokenInput.addEventListener('change', () => {
      if (ws) ws.close();
      ws = new WebSocket(wsUrl());
      ws.onopen = () => {
        sendConnect();
      };
    });

    sendBtn.onclick = () => {
      const payload = {
        type: 'request',
        id: `req_${Date.now()}`,
        method: 'chat.send',
        params: {
          session_id: sessionInput.value,
          channel_id: 'webchat',
          role: 'user',
          content: messageInput.value,
          meta: { agent: 'architect', approved: true, elevated: 'full' }
        }
      };
      ws.send(JSON.stringify(payload));
      messageInput.value = '';
    };

    window.addEventListener('keydown', (evt) => {
      if (evt.key === 'Enter') {
        sendBtn.click();
      }
    });

    async function refreshSessions() {
      const res = await fetch('/sessions');
      const data = await res.json();
      sessionsEl.innerHTML = '';
      (data.sessions || []).forEach((s) => {
        const div = document.createElement('div');
        div.className = 'item';
        div.textContent = `${s.session_id} (${s.message_count})`;
        div.onclick = () => { sessionInput.value = s.session_id; };
        sessionsEl.appendChild(div);
      });
    }

    async function refreshApprovals() {
      const res = await fetch('/approvals');
      const data = await res.json();
      approvalsEl.innerHTML = '';
      (data.pending || []).forEach((a) => {
        const div = document.createElement('div');
        div.className = 'item';
        div.textContent = `${a.run_id} ${a.agent_id}`;
        const approve = document.createElement('button');
        approve.textContent = 'Approve';
        approve.onclick = async () => {
          await fetch(`/approvals/${a.run_id}/approve`, { method: 'POST' });
          refreshApprovals();
        };
        const reject = document.createElement('button');
        reject.textContent = 'Reject';
        reject.onclick = async () => {
          await fetch(`/approvals/${a.run_id}/reject`, { method: 'POST' });
          refreshApprovals();
        };
        div.appendChild(approve);
        div.appendChild(reject);
        approvalsEl.appendChild(div);
      });
    }

    function renderCanvas(state) {
      canvasRender.innerHTML = '';
      const widgets = (state && state.widgets) || [];
      widgets.forEach((widget) => {
        if (widget.type === 'card') {
          const card = document.createElement('div');
          card.style.border = '1px solid #ddd';
          card.style.padding = '0.5rem';
          card.style.marginTop = '0.5rem';
          const title = document.createElement('strong');
          title.textContent = widget.title || 'Card';
          const body = document.createElement('div');
          body.textContent = widget.body || '';
          card.appendChild(title);
          card.appendChild(body);
          canvasRender.appendChild(card);
        }
      });
    }

    async function refreshCanvas() {
      const sessionId = sessionInput.value.trim();
      if (!sessionId) return;
      const res = await fetch(`/canvas/${encodeURIComponent(sessionId)}`);
      const data = await res.json();
      canvasView.textContent = JSON.stringify(data.state || {}, null, 2);
      renderCanvas(data.state || {});
    }

    canvasSave.onclick = async () => {
      const sessionId = sessionInput.value.trim();
      if (!sessionId) return;
      let state = {};
      try {
        state = JSON.parse(canvasEditor.value || '{}');
      } catch (err) {
        alert('Invalid JSON');
        return;
      }
      await fetch(`/canvas/${encodeURIComponent(sessionId)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ state })
      });
      refreshCanvas();
    };

    canvasRefresh.onclick = refreshCanvas;

    setInterval(refreshSessions, 3000);
    setInterval(refreshApprovals, 3000);
    setInterval(refreshCanvas, 5000);
    refreshSessions();
    refreshApprovals();
    refreshCanvas();
  </script>
</body>
</html>
