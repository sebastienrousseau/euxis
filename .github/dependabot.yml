# Dependabot configuration
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # Python — runtime requirements
  - package-ecosystem: pip
    directory: /data/config/requirements
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels: ["dependencies", "python"]
    ignore:
      # chromadb is used only by docs/benchmarks/performance-verification.py
      # — a documentation benchmark script. It is NOT shipped in the C++
      # binaries (apps/cli, apps/gateway, apps/publisher, apps/etx) and
      # the runtime never instantiates a chromadb client. The standing
      # GHSA-rhcg-vfgg-c2c3 alert ("pre-authentication code injection",
      # affects 1.0.0 .. 1.5.9 with no patched version yet) cannot be
      # remediated by a version bump as of 2026-06. Suppress the alert
      # until upstream ships a fix; documented in SECURITY.md.
      - dependency-name: "chromadb"
    groups:
      python-security:
        applies-to: security-updates
        patterns: ["*"]
      python-version:
        applies-to: version-updates
        update-types: ["minor", "patch"]

  # Python — package scaffold template
  - package-ecosystem: pip
    directory: /scripts/templates/euxis-package-template
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    labels: ["dependencies", "python", "template"]

  # Rust — SDK doc crate
  - package-ecosystem: cargo
    directory: /docs/euxis-sdk
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels: ["dependencies", "rust"]

  # Rust — example agent crate
  - package-ecosystem: cargo
    directory: /docs/examples/rust-agent
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    labels: ["dependencies", "rust", "examples"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies", "ci"]
    groups:
      gha-minor:
        applies-to: version-updates
        update-types: ["minor", "patch"]
