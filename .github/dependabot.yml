# Dependabot configuration
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # Python — runtime requirements
  - package-ecosystem: pip
    directory: /data/config/requirements
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels: ["dependencies", "python"]
    groups:
      python-security:
        applies-to: security-updates
        patterns: ["*"]
      python-version:
        applies-to: version-updates
        update-types: ["minor", "patch"]

  # Python — package scaffold template
  - package-ecosystem: pip
    directory: /scripts/templates/euxis-package-template
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    labels: ["dependencies", "python", "template"]

  # Rust — SDK doc crate
  - package-ecosystem: cargo
    directory: /docs/euxis-sdk
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels: ["dependencies", "rust"]

  # Rust — example agent crate
  - package-ecosystem: cargo
    directory: /docs/examples/rust-agent
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    labels: ["dependencies", "rust", "examples"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies", "ci"]
    groups:
      gha-minor:
        applies-to: version-updates
        update-types: ["minor", "patch"]
