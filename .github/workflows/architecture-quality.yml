name: Architecture and Quality Gates

# Rewritten in v0.0.3 (P0.12). The previous workflow referenced ~16
# euxis-ops/* scripts that did not exist, so every step failed at
# runtime; the workflow appeared green because the failure messages
# never made it past `make gate-all` (which also did not exist).
#
# The new workflow runs five standalone gates, each backed by a script
# under scripts/architecture/ that has its own unittest coverage
# (scripts/architecture/tests/test_gates.py).
#
# Every script referenced here must resolve to a real on-disk path:
# the `workflow-integrity` gate enforces that invariant against this
# very file, so the workflow cannot rot back to its previous state.

on:
  push:
    branches: [main, "feat/*", "fix/*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gate-tests:
    name: Gate-script unittests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run gate unittests
        run: python3 -m unittest discover -s scripts/architecture/tests -v

  workflow-integrity:
    name: Workflow integrity (no broken script refs)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Every script reference in .github/workflows/ must resolve
        run: python3 scripts/architecture/check_workflow_integrity.py

  no-stale-dirs:
    name: No stale directories tracked
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Refuse tui/, .venv/, codex/, etc. from being re-introduced
        run: python3 scripts/architecture/check_no_stale_dirs.py

  lib-layout:
    name: libs/ layout audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Every libs/<name>/ must ship CMake, headers, src
        run: python3 scripts/architecture/check_lib_layout.py

  commit-branding:
    name: Branding footer on tip commit
    runs-on: ubuntu-24.04
    # Skip on PRs from:
    #   1. forks (we can't always rewrite a contributor's commit message)
    #   2. bot accounts (dependabot, renovate, etc. emit auto-generated
    #      commits without the branding footer; bot attribution is
    #      already enforced by GitHub's `<bot>[bot]` actor identity,
    #      which is what the branding line records for human commits)
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
       !endsWith(github.event.pull_request.user.login, '[bot]'))
    steps:
      # On pull_request events the default ref is GitHub's synthetic
      # merge commit, which has an auto-generated body that never
      # contains the branding signature. Check out the PR's actual tip
      # so the python script inspects the contributor's commit message.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Branding signature present on HEAD
        run: python3 scripts/architecture/check_commit_branding.py
