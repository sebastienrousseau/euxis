name: Architecture and Quality Gates

on:
  push:
    branches: [main, feat/*, fix/*]
  pull_request:
    branches: [main]

jobs:
  canonical-gates:
    name: Canonical Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run canonical gate entrypoint
        run: make gate-all

  gateway-stability:
    name: Gateway Stability Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install gateway test dependencies
        run: |
          pip install -e euxis-gateway[dev]
          pip install pytest fastapi starlette
      - name: Run bounded gateway package tests
        run: make gateway-tests-stable

  core-stability:
    name: Core Stability Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install core test dependencies
        run: |
          pip install -e euxis-core[dev]
          pip install pytest
      - name: Run bounded core package tests
        run: make core-tests-stable

  cli-stability:
    name: CLI Stability Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install cli test dependencies
        run: |
          pip install -e euxis-cli[dev]
          pip install pytest
      - name: Run bounded cli package tests
        run: make cli-tests-stable

  metrics-stability:
    name: Metrics Stability Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install metrics test dependencies
        run: |
          pip install -e euxis-metrics[dev]
          pip install pytest
      - name: Run bounded metrics package tests
        run: make metrics-tests-stable

  adapters-stability:
    name: Adapters Stability Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install adapters test dependencies
        run: |
          pip install -e euxis-adapters[dev]
          pip install pytest
      - name: Run bounded adapters package tests
        run: make adapters-tests-stable

  security-stability:
    name: Security Stability Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install security test dependencies
        run: |
          pip install -e euxis-security[dev]
          pip install pytest
      - name: Run bounded security package tests
        run: make security-tests-stable

  tui-stability:
    name: TUI Stability Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tui test dependencies
        run: |
          pip install -e euxis-tui[dev]
          pip install pytest
      - name: Run bounded tui package tests
        run: REQUIRE_DEPS=1 make tui-tests-stable

  crypto-lib-stability:
    name: Crypto Lib Stability Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install crypto-lib test dependencies
        run: |
          pip install -e euxis-crypto[dev]
          pip install pytest
      - name: Run bounded crypto-lib package tests
        run: REQUIRE_DEPS=1 make crypto-lib-tests-stable

  resilience-tests:
    name: Resilience and Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install euxis-core
        run: |
          cd euxis-core
          pip install -e .[dev]
      - name: Run targeted tests
        run: |
          cd euxis-core
          pytest -q -o addopts='' tests/unit/test_resilience.py tests/unit/test_platform_adapter.py tests/unit/test_contracts.py tests/unit/test_quality_scripts.py

  perf-and-scorecard:
    name: Performance and Scorecard Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Performance budget
        run: python3 euxis-ops/perf/check_perf_budget.py euxis-runtime/data/perf/metrics.jsonl euxis-ops/perf/perf_policy.json current
      - name: Scorecard gate
        run: python3 euxis-ops/eval/scorecard.py euxis-data/scorecard/metrics.sample.json euxis-data/scorecard/latest.json
      - name: Collect package benchmark dataset
        run: |
          python3 euxis-ops/perf/collect_package_benchmarks.py \
            --repo-root . \
            --standards euxis-ops/quality/package_standards.json \
            --iterations 3 \
            --output euxis-data/perf/package-benchmarks.json
      - name: Validate package benchmark budgets
        run: |
          python3 euxis-ops/perf/validate_package_benchmark_budget.py \
            --benchmarks euxis-data/perf/package-benchmarks.json \
            --policy euxis-ops/perf/package_resource_policy.json \
            --stage current
      - name: Propose package benchmark baseline update
        run: |
          python3 euxis-ops/perf/propose_package_benchmark_baseline.py \
            --current euxis-data/perf/package-benchmarks.json \
            --baseline euxis-ops/perf/package_benchmarks_baseline.json \
            --previous-release v0.0.2 \
            --next-release v0.0.3 \
            --output euxis-data/perf/proposed-package-benchmarks-baseline.json
      - name: Review package benchmark baseline proposal
        run: |
          python3 euxis-ops/release/review_package_benchmark_baseline.py \
            --proposal euxis-data/perf/proposed-package-benchmarks-baseline.json \
            --threshold-percent 25 \
            --output euxis-data/perf/package-benchmark-baseline-review.json \
            --markdown-output euxis-data/perf/package-benchmark-baseline-review.md
      - name: Validate package benchmark baseline governance bundle
        run: |
          python3 euxis-ops/perf/validate_package_benchmark_baseline_governance.py \
            --baseline euxis-ops/perf/package_benchmarks_baseline.json \
            --proposal euxis-data/perf/proposed-package-benchmarks-baseline.json \
            --review euxis-data/perf/package-benchmark-baseline-review.json \
            --json-output euxis-data/perf/package-benchmark-baseline-governance.json
      - name: Add package baseline review summary
        run: cat euxis-data/perf/package-benchmark-baseline-review.md >> "$GITHUB_STEP_SUMMARY"
      - name: Evaluate package benchmark regressions (main push warning)
        if: github.event_name == 'push'
        run: |
          python3 euxis-ops/perf/validate_package_benchmark_regression.py \
            --current euxis-data/perf/package-benchmarks.json \
            --baseline euxis-ops/perf/package_benchmarks_baseline.json \
            --threshold-percent 20 \
            --min-baseline-wall-ms 2 \
            --min-baseline-cpu-ms 2 \
            --min-baseline-memory-mb 32 \
            --min-absolute-wall-ms 0.5 \
            --min-absolute-cpu-ms 0.5 \
            --min-absolute-memory-mb 4 \
            --warn-only \
            --summary-output euxis-data/perf/package-benchmark-regression.md
      - name: Release checklist gate
        run: |
          python3 euxis-ops/release/generate_checklist.py \
            --metrics euxis-runtime/data/perf/metrics.jsonl \
            --policy euxis-ops/perf/perf_policy.json \
            --stage current \
            --baseline euxis-ops/perf/release_baseline.json \
            --threshold-percent 10 \
            --output euxis-data/release/checklist.md \
            --json-output euxis-data/release/checklist.json
      - name: Upload scorecard
        uses: actions/upload-artifact@v4
        with:
          name: release-scorecard
          path: euxis-data/scorecard/latest.json
      - name: Upload release checklist
        uses: actions/upload-artifact@v4
        with:
          name: release-checklist
          path: |
            euxis-data/release/checklist.md
            euxis-data/release/checklist.json
      - name: Propose next release baseline
        run: |
          python3 euxis-ops/perf/propose_release_baseline.py \
            --metrics euxis-runtime/data/perf/metrics.jsonl \
            --previous-release v0.0.2 \
            --next-release v0.0.3 \
            --output euxis-data/release/proposed-baseline.json
      - name: Review baseline proposal (manual-review flag)
        run: |
          python3 euxis-ops/release/review_baseline_proposal.py \
            --baseline euxis-ops/perf/release_baseline.json \
            --proposal euxis-data/release/proposed-baseline.json \
            --threshold-percent 20 \
            --output euxis-data/release/baseline-review.json \
            --markdown-output euxis-data/release/baseline-review.md
      - name: Add baseline review summary
        run: cat euxis-data/release/baseline-review.md >> "$GITHUB_STEP_SUMMARY"
      - name: Build release evidence bundle
        run: |
          python3 euxis-ops/release/aggregate_release_evidence.py \
            --scorecard euxis-data/scorecard/latest.json \
            --checklist euxis-data/release/checklist.json \
            --proposal euxis-data/release/proposed-baseline.json \
            --baseline-review euxis-data/release/baseline-review.json \
            --output euxis-data/release/release-evidence.json \
            --markdown-output euxis-data/release/release-evidence.md
      - name: Add release evidence summary
        run: cat euxis-data/release/release-evidence.md >> "$GITHUB_STEP_SUMMARY"
      - name: Validate release evidence
        run: |
          python3 euxis-ops/release/validate_release_evidence.py \
            --evidence euxis-data/release/release-evidence.json \
            --min-overall 9.0 \
            --min-category 8.0
      - name: Upload proposed baseline
        uses: actions/upload-artifact@v4
        with:
          name: proposed-release-baseline
          path: euxis-data/release/proposed-baseline.json
      - name: Upload baseline review
        uses: actions/upload-artifact@v4
        with:
          name: baseline-review
          path: |
            euxis-data/release/baseline-review.json
            euxis-data/release/baseline-review.md
      - name: Upload release evidence
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence
          path: |
            euxis-data/release/release-evidence.json
            euxis-data/release/release-evidence.md
      - name: Upload package benchmark dataset
        uses: actions/upload-artifact@v4
        with:
          name: package-benchmark-dataset
          path: euxis-data/perf/package-benchmarks.json
      - name: Upload package benchmark baseline proposal/review
        uses: actions/upload-artifact@v4
        with:
          name: package-benchmark-baseline-governance
          path: |
            euxis-data/perf/proposed-package-benchmarks-baseline.json
            euxis-data/perf/package-benchmark-baseline-review.json
            euxis-data/perf/package-benchmark-baseline-review.md
            euxis-data/perf/package-benchmark-baseline-governance.json
      - name: Upload package benchmark regression summary
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: package-benchmark-regression
          path: euxis-data/perf/package-benchmark-regression.md

  perf-trend-warning:
    name: Perf Trend Warning (Q2 target)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Evaluate warning-only trend gate
        run: |
          set +e
          python3 euxis-ops/release/generate_checklist.py \
            --metrics euxis-runtime/data/perf/metrics.jsonl \
            --policy euxis-ops/perf/perf_policy.json \
            --stage target_q2_2026 \
            --baseline euxis-ops/perf/release_baseline.json \
            --threshold-percent 10 \
            --output euxis-data/release/checklist-q2-warning.md \
            --json-output euxis-data/release/checklist-q2-warning.json
          status=$?
          echo "PERF_Q2_STATUS=${status}" >> "$GITHUB_ENV"
          exit 0
      - name: Add perf trend summary
        run: |
          python3 euxis-ops/perf/render_trend_summary.py \
            --report euxis-data/release/checklist-q2-warning.json \
            --status-code "${PERF_Q2_STATUS}" \
            --output euxis-data/release/perf-trend-summary.md
          cat euxis-data/release/perf-trend-summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Collect package benchmarks (warning-only trend)
        run: |
          python3 euxis-ops/perf/collect_package_benchmarks.py \
            --repo-root . \
            --standards euxis-ops/quality/package_standards.json \
            --iterations 1 \
            --output euxis-data/perf/package-benchmarks-pr.json
      - name: Render package benchmark trend summary
        run: |
          python3 euxis-ops/perf/render_package_benchmark_trend.py \
            --current euxis-data/perf/package-benchmarks-pr.json \
            --baseline euxis-ops/perf/package_benchmarks_baseline.json \
            --threshold-percent 10 \
            --output euxis-data/perf/package-benchmark-trend.md
          cat euxis-data/perf/package-benchmark-trend.md >> "$GITHUB_STEP_SUMMARY"
      - name: Evaluate package benchmark regression (warn-only)
        run: |
          python3 euxis-ops/perf/validate_package_benchmark_regression.py \
            --current euxis-data/perf/package-benchmarks-pr.json \
            --baseline euxis-ops/perf/package_benchmarks_baseline.json \
            --threshold-percent 10 \
            --min-baseline-wall-ms 2 \
            --min-baseline-cpu-ms 2 \
            --min-baseline-memory-mb 32 \
            --min-absolute-wall-ms 0.5 \
            --min-absolute-cpu-ms 0.5 \
            --min-absolute-memory-mb 4 \
            --warn-only \
            --summary-output euxis-data/perf/package-benchmark-regression-pr.md
          cat euxis-data/perf/package-benchmark-regression-pr.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload package benchmark trend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-benchmark-trend
          path: |
            euxis-data/perf/package-benchmarks-pr.json
            euxis-data/perf/package-benchmark-trend.md
            euxis-data/perf/package-benchmark-regression-pr.md

  package-structure-matrix-report:
    name: Package Structure Matrix Report
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Report package structure matrix staleness (warn-only)
        run: |
          python3 euxis-ops/quality/report_package_structure_matrix_staleness.py \
            --repo-root . \
            --standards euxis-ops/quality/package_standards.json \
            --matrix euxis-docs/docs/architecture/package-structure-matrix.md \
            --summary-output euxis-data/release/package-structure-matrix-staleness.md \
            --diff-output euxis-data/release/package-structure-matrix-staleness.diff \
            --warn-only
      - name: Add package structure summary
        run: cat euxis-data/release/package-structure-matrix-staleness.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload package structure matrix report
        uses: actions/upload-artifact@v4
        with:
          name: package-structure-matrix-report
          path: |
            euxis-data/release/package-structure-matrix-staleness.md
            euxis-data/release/package-structure-matrix-staleness.diff
