name: Merge Gate Enforcement

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Ensure CI blocks merge on ANY failure
jobs:
  merge-gate:
    name: Enforce Merge Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.pull_request.draft == false

    steps:
      - name: Check required status checks
        uses: actions/github-script@v7
        with:
          script: |
            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha
            });

            const required_checks = [
              'Lint & Format Check',
              'Test Suite (60% Coverage) (ubuntu-latest, 3.12)',
              'Security Vulnerability Scan',
              'Validate Architectural Layers',
              'Verify linux',
              'Verify macos'
            ];

            const failed_checks = [];
            const pending_checks = [];

            for (const check_name of required_checks) {
              const check = checks.check_runs.find(c => c.name === check_name);
              if (!check) {
                pending_checks.push(check_name);
              } else if (check.conclusion !== 'success') {
                failed_checks.push(check_name);
              }
            }

            if (pending_checks.length > 0) {
              core.setFailed(`❌ MERGE BLOCKED: Pending checks: ${pending_checks.join(', ')}`);
              return;
            }

            if (failed_checks.length > 0) {
              core.setFailed(`❌ MERGE BLOCKED: Failed checks: ${failed_checks.join(', ')}`);
              return;
            }

            core.info('✅ All required checks passed - merge allowed');

      - name: Enforce branch protection
        uses: actions/github-script@v7
        with:
          script: |
            // Verify branch protection rules are in place (non-fatal — requires admin token)
            try {
              const { data: protection } = await github.rest.repos.getBranchProtection({
                owner: context.repo.owner,
                repo: context.repo.repo,
                branch: context.payload.pull_request.base.ref
              });

              if (!protection.required_status_checks ||
                  !protection.required_status_checks.strict ||
                  !protection.enforce_admins?.enabled) {
                core.warning('⚠️ Branch protection rules not properly configured');
                return;
              }

              core.info('✅ Branch protection rules verified');
            } catch (error) {
              core.warning(`⚠️ Cannot verify branch protection (may require admin token): ${error.message}`);
            }