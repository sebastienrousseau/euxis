name: Cross Platform Parity

on:
  push:
    branches: [main, feat/*, fix/*]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  parity:
    name: Platform Parity (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install core package
        shell: bash
        run: |
          cd euxis-core
          pip install -e .[dev]
      - name: Architecture boundaries
        shell: bash
        run: python3 scripts/architecture/check_boundaries.py
      - name: Platform parity tests
        shell: bash
        run: |
          cd euxis-core
          pytest -q -o addopts='' tests/unit/test_platform_adapter.py tests/unit/test_contracts.py
