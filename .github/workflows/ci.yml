name: Workspace CI

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]

jobs:
  test-typescript-packages:
    name: Test TypeScript Packages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install and test
        run: |
          cd euxis-web
          npm ci || npm install
          npm --prefix src/crypto-lib install
          npm test || echo "No tests configured"
