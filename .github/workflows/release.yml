name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0-beta.1)'
        required: true
        type: string

permissions:
  contents: write       # Upload release assets
  id-token: write       # Sigstore keyless OIDC
  attestations: write   # GitHub-native attestation (in-toto Statement)

env:
  EUXIS_VERSION: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            os: ubuntu-24.04
            cmake_args: -DEUXIS_NATIVE_ARCH=OFF
          - target: linux-arm64
            os: ubuntu-24.04-arm
            cmake_args: -DEUXIS_NATIVE_ARCH=OFF
          - target: darwin-amd64
            os: macos-13
            cmake_args: -DEUXIS_NATIVE_ARCH=OFF
          - target: darwin-arm64
            os: macos-15
            cmake_args: -DEUXIS_NATIVE_ARCH=OFF
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y g++-14 gcc-14 libsodium-dev libsqlite3-dev \
            pkg-config
          echo "CC=gcc-14"  >> "$GITHUB_ENV"
          echo "CXX=g++-14" >> "$GITHUB_ENV"

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm libsodium sqlite pkg-config
          LLVM_PREFIX="$(brew --prefix llvm)"
          echo "CC=${LLVM_PREFIX}/bin/clang"   >> "$GITHUB_ENV"
          echo "CXX=${LLVM_PREFIX}/bin/clang++" >> "$GITHUB_ENV"
          echo "LDFLAGS=-L${LLVM_PREFIX}/lib/c++ -L${LLVM_PREFIX}/lib/unwind -Wl,-rpath,${LLVM_PREFIX}/lib/c++ -lunwind" >> "$GITHUB_ENV"
          echo "CPPFLAGS=-I${LLVM_PREFIX}/include" >> "$GITHUB_ENV"

      - name: Configure (Release + LTO)
        run: |
          cmake -B cmake-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            ${{ matrix.cmake_args }}

      - name: Build
        run: cmake --build cmake-build --parallel --target euxis-cli

      - name: Smoke test
        run: ./cmake-build/apps/cli/euxis-cli --version

      - name: Package
        id: package
        run: |
          mkdir -p dist
          BIN="euxis-${EUXIS_VERSION}-${{ matrix.target }}"
          cp cmake-build/apps/cli/euxis-cli "dist/${BIN}"
          (cd dist && tar -czf "${BIN}.tar.gz" "${BIN}")
          rm "dist/${BIN}"
          (cd dist && shasum -a 256 "${BIN}.tar.gz" > "${BIN}.tar.gz.sha256")
          echo "archive=dist/${BIN}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=dist/${BIN}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Sign (keyless via Sigstore OIDC)
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          cosign sign-blob --yes \
            --bundle "${{ steps.package.outputs.archive }}.cosign.bundle" \
            "${{ steps.package.outputs.archive }}"

      - name: Generate SLSA build provenance (in-toto Statement)
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ steps.package.outputs.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: euxis-${{ matrix.target }}
          path: dist/*

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Combined SHA256SUMS
        run: |
          cd dist
          cat *.sha256 > SHA256SUMS
          ls -la

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign SHA256SUMS
        run: |
          cosign sign-blob --yes \
            --bundle dist/SHA256SUMS.cosign.bundle \
            dist/SHA256SUMS

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.EUXIS_VERSION }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.cosign.bundle
            dist/SHA256SUMS
            dist/SHA256SUMS.cosign.bundle

  docker:
    name: Build and push Docker image
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download linux-amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: euxis-linux-amd64
          path: dist

      - name: Download linux-arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: euxis-linux-arm64
          path: dist

      - name: Extract binaries for image build context
        run: |
          mkdir -p ctx/linux-amd64 ctx/linux-arm64
          tar -xzf dist/euxis-${EUXIS_VERSION}-linux-amd64.tar.gz -C ctx/linux-amd64 --strip-components=0
          tar -xzf dist/euxis-${EUXIS_VERSION}-linux-arm64.tar.gz -C ctx/linux-arm64 --strip-components=0
          mv "ctx/linux-amd64/euxis-${EUXIS_VERSION}-linux-amd64" ctx/linux-amd64/euxis
          mv "ctx/linux-arm64/euxis-${EUXIS_VERSION}-linux-arm64" ctx/linux-arm64/euxis

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: scripts/release/Dockerfile.scratch
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/euxis:${{ env.EUXIS_VERSION }}
            ghcr.io/${{ github.repository_owner }}/euxis:latest
          provenance: true
          sbom: true
