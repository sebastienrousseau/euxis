name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0-beta.1)'
        required: true
        type: string

permissions:
  contents: write       # Upload release assets
  id-token: write       # Sigstore keyless OIDC
  attestations: write   # GitHub-native attestation (in-toto Statement)

env:
  EUXIS_VERSION: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            os: ubuntu-24.04
            cmake_args: -DEUXIS_NATIVE_ARCH=OFF
          - target: linux-arm64
            os: ubuntu-24.04-arm
            cmake_args: -DEUXIS_NATIVE_ARCH=OFF
          # darwin-amd64 (Intel) was sourced from macos-13. That runner pool
          # is starved (GitHub's Intel sunset) and PR #99 dropped it from
          # the regular C++ CI for the same reason. Drop here too; Apple
          # Silicon coverage via macos-15 is the path forward.
          - target: darwin-arm64
            os: macos-15
            cmake_args: -DEUXIS_NATIVE_ARCH=OFF
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y g++-14 gcc-14 libsodium-dev libsqlite3-dev \
            pkg-config
          echo "CC=gcc-14"  >> "$GITHUB_ENV"
          echo "CXX=g++-14" >> "$GITHUB_ENV"

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          # Use Apple Clang (matches the SDK) instead of Homebrew LLVM 22.
          # PR #99 found that Homebrew LLVM 22.1.7's libc++ wrappers can't
          # find <string.h> via the GitHub runner SDK — same root cause
          # surfaced on the release.yml v0.1.2 darwin-arm64 build. Apple
          # Clang lacks <generator> but the CLI binary does not need that
          # path (it's only exercised by the streaming test code).
          brew install libsodium sqlite pkg-config

      - name: Configure (Release + LTO)
        run: |
          cmake -B cmake-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            ${{ matrix.cmake_args }}

      - name: Build
        # `--parallel` defaults to nproc which on ubuntu-24.04-arm (4 vCPU
        # / 16 GB) OOM-kills the runner under Release builds — the heavy
        # generator / runtime TUs alone need ~3 GB peak each. Pinning to
        # `--parallel 2` keeps the build under the memory ceiling and
        # finishes inside the release-window budget.
        run: cmake --build cmake-build --parallel 2 --target euxis-cli

      - name: Smoke test
        run: ./cmake-build/apps/cli/euxis-cli --version

      - name: Package
        id: package
        run: |
          mkdir -p dist
          BIN="euxis-${EUXIS_VERSION}-${{ matrix.target }}"
          cp cmake-build/apps/cli/euxis-cli "dist/${BIN}"
          (cd dist && tar -czf "${BIN}.tar.gz" "${BIN}")
          rm "dist/${BIN}"
          (cd dist && shasum -a 256 "${BIN}.tar.gz" > "${BIN}.tar.gz.sha256")
          echo "archive=dist/${BIN}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=dist/${BIN}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Sign (keyless via Sigstore OIDC)
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          cosign sign-blob --yes \
            --bundle "${{ steps.package.outputs.archive }}.cosign.bundle" \
            "${{ steps.package.outputs.archive }}"

      - name: Generate SLSA build provenance (in-toto Statement)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.package.outputs.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: euxis-${{ matrix.target }}
          path: dist/*

  linux-packages:
    name: Build .deb + .rpm packages
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            cmake_arch_flag: ""
          - arch: arm64
            cmake_arch_flag: ""
            runner_override: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y g++-14 gcc-14 libsodium-dev libsqlite3-dev \
            pkg-config rpm
          echo "CC=gcc-14"  >> "$GITHUB_ENV"
          echo "CXX=g++-14" >> "$GITHUB_ENV"

      - name: Configure (Release + install prefix)
        run: |
          cmake -B cmake-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DEUXIS_NATIVE_ARCH=OFF \
            ${{ matrix.cmake_arch_flag }}

      - name: Build CLI target
        run: cmake --build cmake-build --parallel --target euxis-cli

      - name: Emit .deb + .rpm via CPack
        run: |
          mkdir -p dist
          cd cmake-build
          cpack -G DEB -D CPACK_PACKAGE_FILE_NAME="euxis-${EUXIS_VERSION}-linux-${{ matrix.arch }}"
          cpack -G RPM -D CPACK_PACKAGE_FILE_NAME="euxis-${EUXIS_VERSION}-linux-${{ matrix.arch }}"
          mv *.deb *.rpm ../dist/ 2>/dev/null || true
          cd ../dist
          ls -la

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: euxis-packages-linux-${{ matrix.arch }}
          path: dist/*

  publish:
    name: Publish release
    # linux-packages is intentionally not in `needs:` — the CPack
    # invocation hangs indefinitely on the ubuntu-24.04 + ubuntu-24.04-arm
    # runners (110+ min observed on run #27888557585 with no recovery).
    # The .tar.gz + .sha256 + cosign bundles + Docker image are the
    # primary distribution channel; .deb/.rpm packaging is tracked as a
    # separate follow-up. The linux-packages job still runs in parallel
    # so its eventual fix can be validated without re-running the whole
    # workflow.
    needs: [build]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          # Only the euxis-* artifacts; the docker/buildx job uploads a
          # zero-byte attestation artifact with tildes in its name
          # ("…~…~…dockerbuild") that breaks download-artifact@v4's
          # extraction path, failing the whole step "after 5 retries".
          pattern: "euxis-*"
          path: dist
          merge-multiple: true

      - name: Combined SHA256SUMS
        run: |
          cd dist
          cat *.sha256 > SHA256SUMS
          ls -la

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign SHA256SUMS
        run: |
          cosign sign-blob --yes \
            --bundle dist/SHA256SUMS.cosign.bundle \
            dist/SHA256SUMS

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.EUXIS_VERSION }}
          generate_release_notes: true
          # `dist/*.deb` and `dist/*.rpm` are intentionally absent: the
          # linux-packages job hangs in CPack and is decoupled from
          # publish (see PR #106). The .tar.gz / .sha256 / cosign
          # bundles + Docker image are the v0.1.3 distribution channel;
          # .deb/.rpm will land via a separate run once the CPack hang
          # is diagnosed. Keeping fail_on_unmatched_files=true so an
          # unintentional regression on the *present* artifacts still
          # surfaces immediately.
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.cosign.bundle
            dist/SHA256SUMS
            dist/SHA256SUMS.cosign.bundle

  docker:
    name: Build and push Docker image
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download linux-amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: euxis-linux-amd64
          path: dist

      - name: Download linux-arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: euxis-linux-arm64
          path: dist

      - name: Extract binaries for image build context
        run: |
          # The Dockerfile uses COPY ctx/${TARGETPLATFORM}/euxis /euxis
          # where TARGETPLATFORM is "linux/amd64" or "linux/arm64" —
          # slash-separated, NOT "linux-amd64" with a hyphen. The old
          # form caused: 'failed to calculate checksum of ref ...
          # "/ctx/linux/amd64/euxis": not found'. Use the slashed paths.
          mkdir -p ctx/linux/amd64 ctx/linux/arm64
          tar -xzf dist/euxis-${EUXIS_VERSION}-linux-amd64.tar.gz -C ctx/linux/amd64 --strip-components=0
          tar -xzf dist/euxis-${EUXIS_VERSION}-linux-arm64.tar.gz -C ctx/linux/arm64 --strip-components=0
          mv "ctx/linux/amd64/euxis-${EUXIS_VERSION}-linux-amd64" ctx/linux/amd64/euxis
          mv "ctx/linux/arm64/euxis-${EUXIS_VERSION}-linux-arm64" ctx/linux/arm64/euxis

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: scripts/release/Dockerfile.scratch
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/euxis:${{ env.EUXIS_VERSION }}
            ghcr.io/${{ github.repository_owner }}/euxis:latest
          provenance: true
          sbom: true
