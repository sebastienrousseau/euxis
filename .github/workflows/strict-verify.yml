name: strict-verify

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify-all:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.3"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: "npm"
          cache-dependency-path: |
            euxis-crypto-packages/package-lock.json
            euxis-crypto-packages/src/crypto-lib/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup venv and pinned Python deps
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install \
            pytest==9.0.2 \
            pytest-cov==7.0.0 \
            pytest-asyncio==1.3.0 \
            hypothesis==6.151.9 \
            textual==8.0.0 \
            cryptography==46.0.5

      - name: Install pinned Node deps
        run: |
          npm --prefix euxis-crypto-packages ci
          npm --prefix euxis-crypto-packages/src/crypto-lib ci

      - name: Strict verify (single path)
        run: make verify-all-packages REQUIRE_DEPS=1
