name: Supply Chain Integrity

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  sbom-and-signature:
    name: SBOM and Signature
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Keyless sign SBOM
        run: |
          cosign sign-blob --yes \
            --output-signature sbom.spdx.sig \
            --output-certificate sbom.spdx.pem \
            sbom.spdx.json

      - name: Verify keyless signature
        run: |
          cosign verify-blob \
            --certificate sbom.spdx.pem \
            --signature sbom.spdx.sig \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp "https://github.com/.+" \
            sbom.spdx.json

      - name: Upload supply chain artifacts
        uses: actions/upload-artifact@v4
        with:
          name: supply-chain-artifacts
          path: |
            sbom.spdx.json
            sbom.spdx.sig
            sbom.spdx.pem

