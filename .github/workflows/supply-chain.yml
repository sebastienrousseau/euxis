name: Supply Chain Integrity

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  sbom-and-attestation:
    name: SBOM, Attestation, and Signature
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Build provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: sbom.spdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Keyless sign SBOM
        run: |
          cosign sign-blob --yes \
            --output-signature sbom.spdx.sig \
            --output-certificate sbom.spdx.pem \
            sbom.spdx.json

      - name: Verify keyless signature
        run: |
          cosign verify-blob \
            --certificate sbom.spdx.pem \
            --signature sbom.spdx.sig \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp "https://github.com/.+" \
            sbom.spdx.json

      - name: Upload supply chain artifacts
        uses: actions/upload-artifact@v4
        with:
          name: supply-chain-artifacts
          path: |
            sbom.spdx.json
            sbom.spdx.sig
            sbom.spdx.pem

  sign-release-artifacts:
    name: Build and Sign Release Artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build wheels and sdists
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          modules=(
            euxis-core
            euxis-cli
            euxis-gateway
            euxis-adapters
            euxis-metrics
            euxis-security
          )
          for module in "${modules[@]}"; do
            if [[ -f "${module}/pyproject.toml" ]]; then
              python -m build --sdist --wheel --outdir "release-artifacts/${module}" "${module}"
            fi
          done
          find release-artifacts -type f \( -name '*.whl' -o -name '*.tar.gz' \) -print > release-artifacts/dist-files.txt
          if [[ ! -s release-artifacts/dist-files.txt ]]; then
            echo "No release artifacts were built." >&2
            exit 1
          fi
          tar -czf release-artifacts/release-bundle.tar.gz -T release-artifacts/dist-files.txt

      - name: Build provenance attestation for built artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release-artifacts/release-bundle.tar.gz

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Keyless sign release artifacts
        run: |
          set -euo pipefail
          while IFS= read -r file; do
            [[ -n "${file}" ]] || continue
            cosign sign-blob --yes \
              --output-signature "${file}.sig" \
              --output-certificate "${file}.pem" \
              "${file}"
          done < release-artifacts/dist-files.txt

      - name: Verify release artifact signatures
        run: |
          set -euo pipefail
          while IFS= read -r file; do
            [[ -n "${file}" ]] || continue
            cosign verify-blob \
              --certificate "${file}.pem" \
              --signature "${file}.sig" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              --certificate-identity-regexp "https://github.com/.+" \
              "${file}"
          done < release-artifacts/dist-files.txt

      - name: Upload signed release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-artifacts
          path: release-artifacts

  verify-uploaded-artifacts:
    name: Verify Uploaded Signed Artifacts
    runs-on: ubuntu-latest
    needs: sign-release-artifacts
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Download signed release artifacts
        uses: actions/download-artifact@v4
        with:
          name: signed-release-artifacts
          path: release-artifacts

      - name: Verify downloaded signatures end-to-end
        run: |
          bash euxis-ops/supply_chain/verify_signed_artifacts.sh release-artifacts
          mkdir -p euxis-data/release
          cat > euxis-data/release/signature-verification.json <<'JSON'
          {
            "status": "verified",
            "source": "supply-chain.verify-uploaded-artifacts"
          }
          JSON
      - name: Upload signature verification status
        uses: actions/upload-artifact@v4
        with:
          name: signature-verification-status
          path: euxis-data/release/signature-verification.json

      - name: Build quality artifacts for strict evidence validation
        run: |
          python3 euxis-ops/eval/scorecard.py euxis-data/scorecard/metrics.sample.json euxis-data/scorecard/latest.json
          python3 euxis-ops/release/generate_checklist.py \
            --metrics euxis-runtime/data/perf/metrics.jsonl \
            --policy euxis-ops/perf/perf_policy.json \
            --stage current \
            --baseline euxis-ops/perf/release_baseline.json \
            --threshold-percent 10 \
            --output euxis-data/release/checklist.md \
            --json-output euxis-data/release/checklist.json
          python3 euxis-ops/perf/propose_release_baseline.py \
            --metrics euxis-runtime/data/perf/metrics.jsonl \
            --previous-release v0.0.3 \
            --next-release v0.0.3 \
            --output euxis-data/release/proposed-baseline.json
          python3 euxis-ops/release/review_baseline_proposal.py \
            --baseline euxis-ops/perf/release_baseline.json \
            --proposal euxis-data/release/proposed-baseline.json \
            --threshold-percent 20 \
            --output euxis-data/release/baseline-review.json \
            --markdown-output euxis-data/release/baseline-review.md

      - name: Build strict release evidence bundle
        run: |
          python3 euxis-ops/release/aggregate_release_evidence.py \
            --scorecard euxis-data/scorecard/latest.json \
            --checklist euxis-data/release/checklist.json \
            --proposal euxis-data/release/proposed-baseline.json \
            --baseline-review euxis-data/release/baseline-review.json \
            --signature-status euxis-data/release/signature-verification.json \
            --output euxis-data/release/release-evidence.json \
            --markdown-output euxis-data/release/release-evidence.md

      - name: Validate strict release evidence (signature required)
        run: |
          python3 euxis-ops/release/validate_release_evidence.py \
            --evidence euxis-data/release/release-evidence.json \
            --min-overall 9.0 \
            --min-category 8.0 \
            --require-signature-verified

      - name: Upload strict release evidence
        uses: actions/upload-artifact@v4
        with:
          name: strict-release-evidence
          path: |
            euxis-data/release/release-evidence.json
            euxis-data/release/release-evidence.md
