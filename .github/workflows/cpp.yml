name: C++ CI
on: [push, pull_request]
jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: ${{ github.workspace }}/vcpkg
          vcpkgGitCommitId: 'f6735d5aa1537081e8d425372ea7e585b0ad65e8'
          vcpkgJsonGlob: 'euxis-cpp/vcpkg.json'
      - name: Build
        run: make cpp-build
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      - name: Test
        run: make cpp-test
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      - name: Benchmark
        run: make cpp-bench
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-benchmark-${{ matrix.os }}
          path: euxis-data/perf/cpp-benchmark-results.json
          if-no-files-found: ignore
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-test-logs-${{ matrix.os }}
          path: euxis-cpp/build/Testing/
          if-no-files-found: ignore
