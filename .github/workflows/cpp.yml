name: C++ CI
on: [push, pull_request]
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # macos-14 (Apple Silicon, older Apple Clang) + macos-15 (Apple
        # Silicon, newer Apple Clang) cover the macOS surface. macos-13
        # is the last Intel runner SKU and GitHub's allocation pool for
        # it is so starved that jobs sit queued for hours — even with
        # the matrix green on every other entry, the PR can't merge
        # while macos-13 hangs in QUEUED state. Drop it; coverage stays
        # on two Apple Silicon SKUs that exercise both Apple Clang
        # generations, and Ubuntu carries the Linux side.
        os: [ubuntu-22.04, ubuntu-24.04, macos-14, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          # GCC 14 brings libstdc++14 which provides <generator> (C++23).
          # libs/runtime/include/euxis/runtime/session_store.hpp includes
          # it for the std::generator coroutine return type. Ubuntu 22.04
          # does not ship g++-14 in its default repos — add the
          # ubuntu-toolchain-r/test PPA so it resolves on both 22.04 and
          # 24.04.
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y g++-14 gcc-14 libsodium-dev nlohmann-json3-dev \
            libspdlog-dev libfmt-dev libgtest-dev libsqlite3-dev pkg-config
      - name: Select GCC 14 (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          echo "CC=gcc-14"  >> "$GITHUB_ENV"
          echo "CXX=g++-14" >> "$GITHUB_ENV"
      - name: Relax AppArmor unprivileged-userns restriction (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          # Ubuntu 24.04 ships kernel.apparmor_restrict_unprivileged_userns=1.
          # That blocks user-namespace clones, which the AddressSanitizer
          # runtime uses for shadow memory. The downstream symptom is
          # execve() returning EPERM ("Operation not permitted") from a
          # forked child even for benign binaries like /usr/bin/echo —
          # see libs/platform/tests/test_execution_backend.cpp + issue #96.
          # Relax it for the runner shell; the kernel default returns on
          # reboot and the runner is ephemeral.
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          # Apple Clang ships with the SDK so libc++'s header wrappers
          # always resolve. Homebrew LLVM 22.1.7 was tried earlier and
          # broke on macos-14/15 with "<cstring> tried including
          # <string.h> but didn't find libc++'s <string.h>" — the
          # Homebrew libc++ expects features from a newer SDK than the
          # GitHub runners ship. The trade-off: Apple Clang lacks
          # <generator>, so EUXIS_HAS_STD_GENERATOR is off and the
          # streaming/session-store generator paths are skipped on
          # macOS. Ubuntu GCC 14 carries that coverage.
          brew install libsodium nlohmann-json spdlog fmt googletest \
            sqlite pkg-config
      - name: Build
        run: make cpp-build
      - name: Test
        run: make cpp-test
      - name: Benchmark
        run: make cpp-bench
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-benchmark-${{ matrix.os }}
          path: fixtures/benchmarks/cpp-benchmark-results.json
          if-no-files-found: ignore
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-test-logs-${{ matrix.os }}
          path: build/cmake-build/Testing/
          if-no-files-found: ignore

  # C++26 contracts pilot — runs the runtime suite with the pilot flag
  # ON so the death tests in libs/runtime/tests/test_contracts.cpp stay
  # honest. Single OS to keep CI cost bounded; the contract logic is
  # platform-agnostic so a 1-OS variant catches regressions reliably.
  build-contracts-pilot:
    name: contracts pilot (ubuntu-24.04)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y g++-14 gcc-14 libsodium-dev nlohmann-json3-dev \
            libspdlog-dev libfmt-dev libgtest-dev libsqlite3-dev pkg-config
          echo "CC=gcc-14"  >> "$GITHUB_ENV"
          echo "CXX=g++-14" >> "$GITHUB_ENV"
          # See issue #96 — Ubuntu 24.04's AppArmor unprivileged-userns
          # restriction blocks ASan-instrumented execve().
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
      - name: Configure with contracts pilot ON
        run: |
          cmake -B build/cmake-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DEUXIS_ENABLE_CXX26_CONTRACTS=ON
      - name: Build runtime test binary
        run: cmake --build build/cmake-build --parallel --target euxis-runtime-cpp_tests
      - name: Run runtime suite (death tests included)
        run: ./build/cmake-build/libs/runtime/euxis-runtime-cpp_tests
      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: contracts-pilot-test-logs
          path: build/cmake-build/Testing/
          if-no-files-found: ignore
