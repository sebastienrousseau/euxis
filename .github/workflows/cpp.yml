name: C++ CI
on: [push, pull_request]
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # macos-15 is Apple Silicon (arm64); macos-13/14 are Intel (x86_64).
        # Keeping all three so the build is exercised on both architectures
        # while CMakeLists.txt drives the right -march per host.
        os: [ubuntu-22.04, ubuntu-24.04, macos-13, macos-14, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          # GCC 14 brings libstdc++14 which provides <generator> (C++23).
          # libs/runtime/include/euxis/runtime/session_store.hpp includes
          # it for the std::generator coroutine return type. Ubuntu 22.04
          # does not ship g++-14 in its default repos — add the
          # ubuntu-toolchain-r/test PPA so it resolves on both 22.04 and
          # 24.04.
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y g++-14 gcc-14 libsodium-dev nlohmann-json3-dev \
            libspdlog-dev libfmt-dev libgtest-dev libsqlite3-dev pkg-config
      - name: Select GCC 14 (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          echo "CC=gcc-14"  >> "$GITHUB_ENV"
          echo "CXX=g++-14" >> "$GITHUB_ENV"
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          # Homebrew LLVM ships a clang/libc++ with <generator> (C++23).
          # Apple Clang on macos-13 and macos-14 lags upstream LLVM and
          # does not provide that header; libs/runtime/include/euxis/
          # runtime/session_store.hpp requires it.
          brew install llvm libsodium nlohmann-json spdlog fmt googletest \
            sqlite pkg-config
      - name: Select Homebrew Clang (macOS)
        if: runner.os == 'macOS'
        run: |
          LLVM_PREFIX="$(brew --prefix llvm)"
          echo "CC=${LLVM_PREFIX}/bin/clang"   >> "$GITHUB_ENV"
          echo "CXX=${LLVM_PREFIX}/bin/clang++" >> "$GITHUB_ENV"
          # libc++ from Homebrew LLVM is at ${LLVM_PREFIX}/lib/c++.
          echo "LDFLAGS=-L${LLVM_PREFIX}/lib/c++ -L${LLVM_PREFIX}/lib/unwind -Wl,-rpath,${LLVM_PREFIX}/lib/c++ -lunwind" >> "$GITHUB_ENV"
          echo "CPPFLAGS=-I${LLVM_PREFIX}/include" >> "$GITHUB_ENV"
      - name: Build
        run: make cpp-build
      - name: Test
        run: make cpp-test
      - name: Benchmark
        run: make cpp-bench
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-benchmark-${{ matrix.os }}
          path: fixtures/benchmarks/cpp-benchmark-results.json
          if-no-files-found: ignore
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-test-logs-${{ matrix.os }}
          path: build/cmake-build/Testing/
          if-no-files-found: ignore
