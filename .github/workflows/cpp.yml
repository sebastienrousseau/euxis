name: C++ CI
on: [push, pull_request]
jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: ${{ github.workspace }}/vcpkg
          vcpkgGitCommitId: 'd36306e1dc09cb9864db77fddf3ecf0611919bc2'
          vcpkgJsonGlob: 'euxis-cpp/vcpkg.json'
      - name: Build
        run: make cpp-build
      - name: Test
        run: make cpp-test
      - name: Benchmark
        run: make cpp-bench
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-benchmark-${{ matrix.os }}
          path: euxis-data/perf/cpp-benchmark-results.json
          if-no-files-found: ignore
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-test-logs-${{ matrix.os }}
          path: euxis-cpp/build/Testing/
          if-no-files-found: ignore
