name: C++ CI
on: [push, pull_request]
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-13, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # GCC 14 brings libstdc++14 which provides <generator> (C++23).
          # libs/runtime/include/euxis/runtime/session_store.hpp includes it
          # for the std::generator coroutine return type.
          sudo apt-get install -y g++-14 gcc-14 libsodium-dev nlohmann-json3-dev \
            libspdlog-dev libfmt-dev libgtest-dev libsqlite3-dev pkg-config
      - name: Select GCC 14 (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          echo "CC=gcc-14"  >> "$GITHUB_ENV"
          echo "CXX=g++-14" >> "$GITHUB_ENV"
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install libsodium nlohmann-json spdlog fmt googletest sqlite pkg-config
      - name: Build
        run: make cpp-build
      - name: Test
        run: make cpp-test
      - name: Benchmark
        run: make cpp-bench
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-benchmark-${{ matrix.os }}
          path: fixtures/benchmarks/cpp-benchmark-results.json
          if-no-files-found: ignore
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-test-logs-${{ matrix.os }}
          path: build/cmake-build/Testing/
          if-no-files-found: ignore
