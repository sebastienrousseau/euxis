name: C++ CI
on: [push, pull_request]
jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: lukka/run-vcpkg@v11
      - run: make cpp-build
      - run: make cpp-test
      - run: make cpp-bench
