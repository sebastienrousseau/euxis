name: Security Scan

on:
  push:
    branches: [main, feat/*, fix/*]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  nodejs-security:
    name: Node.js Security Scan
    runs-on: ubuntu-latest
    if: contains(github.repository, 'euxis')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            euxis-web/package-lock.json
            euxis-web/src/crypto-lib/package-lock.json

      - name: Install dependencies
        working-directory: euxis-web
        run: |
          npm ci --audit-level moderate
          npm --prefix src/crypto-lib ci --audit-level moderate

      - name: Run npm audit
        working-directory: euxis-web
        run: |
          npm audit --audit-level high --json > npm-audit.json || true
          if [[ -f npm-audit.json ]]; then
            echo "::group::NPM Audit Results"
            cat npm-audit.json | jq -r '.vulnerabilities | to_entries[]? | "❌ \(.key): \(.value.severity) - \(.value.title)"'
            echo "::endgroup::"

            # Check for high/critical vulnerabilities
            HIGH_VULN_COUNT=$(cat npm-audit.json | jq '.metadata.vulnerabilities.high // 0')
            CRITICAL_VULN_COUNT=$(cat npm-audit.json | jq '.metadata.vulnerabilities.critical // 0')

            if [[ $HIGH_VULN_COUNT -gt 0 || $CRITICAL_VULN_COUNT -gt 0 ]]; then
              echo "::error::Found $CRITICAL_VULN_COUNT critical and $HIGH_VULN_COUNT high severity vulnerabilities"
              exit 1
            fi
          fi

      - name: Run Semgrep for JavaScript/TypeScript
        working-directory: euxis-web
        run: |
          # Install semgrep
          pip install semgrep==1.52.0
          semgrep --config=auto --json --output=semgrep-js-report.json src/ || true
          if [[ -f semgrep-js-report.json ]]; then
            echo "::group::Semgrep JavaScript/TypeScript Findings"
            cat semgrep-js-report.json | jq -r '.results[]? | "🔍 \(.path):\(.start.line) [\(.check_id)] \(.extra.message)"'
            echo "::endgroup::"
          fi

      - name: Upload Node.js security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nodejs-security-reports
          path: |
            euxis-web/npm-audit.json
            euxis-web/semgrep-js-report.json
          retention-days: 30

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [nodejs-security]
    if: always()

    steps:
      - name: Download all security reports
        uses: actions/download-artifact@v4
        with:
          path: security-reports

      - name: Generate security summary
        run: |
          echo "# 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status | Critical | High |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|---------|----------|------|" >> $GITHUB_STEP_SUMMARY

          # Process Node.js security reports
          if [[ -d "security-reports/nodejs-security-reports" ]]; then
            critical=0
            high=0
            if [[ -f "security-reports/nodejs-security-reports/npm-audit.json" ]]; then
              critical=$(cat "security-reports/nodejs-security-reports/npm-audit.json" | jq '.metadata.vulnerabilities.critical // 0' 2>/dev/null || echo 0)
              high=$(cat "security-reports/nodejs-security-reports/npm-audit.json" | jq '.metadata.vulnerabilities.high // 0' 2>/dev/null || echo 0)
            fi

            status="✅ PASS"
            if [[ $critical -gt 0 || $high -gt 0 ]]; then
              status="❌ FAIL"
            fi

            echo "| euxis-web (Node.js) | $status | $critical | $high | - | - |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scan completed at:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow:** ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY