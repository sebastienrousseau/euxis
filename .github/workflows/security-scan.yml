name: Security Scan

on:
  push:
    branches: [main, feat/*, fix/*]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:

env:
  # Fail fast on security issues
  PYTHONDONTWRITEBYTECODE: 1
  PYTHONUNBUFFERED: 1

jobs:
  python-security:
    name: Python Security Scan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - euxis-core
          - euxis-cli
          - euxis-docs
          - euxis-gateway
          - euxis-metrics
          - euxis-adapters
          - euxis-security

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-security-${{ hashFiles(format('{0}/pyproject.toml', matrix.module)) }}
          restore-keys: |
            ${{ runner.os }}-pip-security-
            ${{ runner.os }}-pip-

      - name: Install security scanning tools
        run: |
          python -m pip install --upgrade pip
          pip install safety==3.0.1 bandit[toml]==1.7.5 pip-audit==2.6.3 semgrep==1.52.0

      - name: Check if module has Python dependencies
        id: check-deps
        working-directory: ${{ matrix.module }}
        run: |
          if [[ -f pyproject.toml ]]; then
            echo "has_python=true" >> $GITHUB_OUTPUT
          else
            echo "has_python=false" >> $GITHUB_OUTPUT
          fi

      - name: Install module dependencies
        if: steps.check-deps.outputs.has_python == 'true'
        working-directory: ${{ matrix.module }}
        run: |
          if [[ -f pyproject.toml ]]; then
            pip install -e .[dev] || pip install -e . || true
            # Create requirements.txt for safety scan
            pip freeze > requirements-temp.txt
          fi

      - name: Run Safety check for known vulnerabilities
        if: steps.check-deps.outputs.has_python == 'true'
        working-directory: ${{ matrix.module }}
        run: |
          if [[ -f requirements-temp.txt ]]; then
            safety check -r requirements-temp.txt --json --output safety-report.json || true
            if [[ -f safety-report.json ]]; then
              echo "::group::Safety Vulnerability Report"
              cat safety-report.json | jq -r '.vulnerabilities[]? | "❌ \(.package_name) \(.installed_version): \(.vulnerability.advisory)"'
              echo "::endgroup::"
              # Fail if critical vulnerabilities found
              CRITICAL_COUNT=$(cat safety-report.json | jq '.vulnerabilities[]? | select(.vulnerability.severity == "high" or .vulnerability.severity == "critical")' | jq -s length)
              if [[ $CRITICAL_COUNT -gt 0 ]]; then
                echo "::error::Found $CRITICAL_COUNT critical/high severity vulnerabilities"
                exit 1
              fi
            fi
          fi

      - name: Run pip-audit for comprehensive vulnerability scanning
        if: steps.check-deps.outputs.has_python == 'true'
        working-directory: ${{ matrix.module }}
        run: |
          if [[ -f pyproject.toml ]]; then
            pip-audit --desc --format=json --output=pip-audit.json . || true
            if [[ -f pip-audit.json ]]; then
              echo "::group::Pip-Audit Vulnerability Report"
              cat pip-audit.json | jq -r '.vulnerabilities[]? | "❌ \(.package) \(.installed_version): \(.description)"'
              echo "::endgroup::"
            fi
          fi

      - name: Run Bandit security linter
        if: steps.check-deps.outputs.has_python == 'true'
        working-directory: ${{ matrix.module }}
        run: |
          if [[ -d src ]]; then
            bandit -r src/ -f json -o bandit-report.json || true
            if [[ -f bandit-report.json ]]; then
              echo "::group::Bandit Security Issues"
              cat bandit-report.json | jq -r '.results[]? | "⚠️  \(.filename):\(.line_number) [\(.test_id)] \(.issue_text)"'
              echo "::endgroup::"
              # Fail on high/critical severity issues
              HIGH_COUNT=$(cat bandit-report.json | jq '.results[]? | select(.issue_severity == "HIGH" or .issue_severity == "CRITICAL")' | jq -s length)
              if [[ $HIGH_COUNT -gt 0 ]]; then
                echo "::warning::Found $HIGH_COUNT high/critical security issues - review required"
              fi
            fi
          fi

      - name: Run Semgrep security analysis
        if: steps.check-deps.outputs.has_python == 'true'
        working-directory: ${{ matrix.module }}
        run: |
          if [[ -d src ]]; then
            semgrep --config=auto --json --output=semgrep-report.json src/ || true
            if [[ -f semgrep-report.json ]]; then
              echo "::group::Semgrep Security Findings"
              cat semgrep-report.json | jq -r '.results[]? | "🔍 \(.path):\(.start.line) [\(.check_id)] \(.extra.message)"'
              echo "::endgroup::"
            fi
          fi

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-${{ matrix.module }}
          path: |
            ${{ matrix.module }}/safety-report.json
            ${{ matrix.module }}/pip-audit.json
            ${{ matrix.module }}/bandit-report.json
            ${{ matrix.module }}/semgrep-report.json
          retention-days: 30

  nodejs-security:
    name: Node.js Security Scan
    runs-on: ubuntu-latest
    if: contains(github.repository, 'euxis')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'euxis-web/package*.json'

      - name: Install dependencies
        working-directory: euxis-web
        run: |
          npm ci --audit-level moderate

      - name: Run npm audit
        working-directory: euxis-web
        run: |
          npm audit --audit-level high --json > npm-audit.json || true
          if [[ -f npm-audit.json ]]; then
            echo "::group::NPM Audit Results"
            cat npm-audit.json | jq -r '.vulnerabilities | to_entries[]? | "❌ \(.key): \(.value.severity) - \(.value.title)"'
            echo "::endgroup::"

            # Check for high/critical vulnerabilities
            HIGH_VULN_COUNT=$(cat npm-audit.json | jq '.metadata.vulnerabilities.high // 0')
            CRITICAL_VULN_COUNT=$(cat npm-audit.json | jq '.metadata.vulnerabilities.critical // 0')

            if [[ $HIGH_VULN_COUNT -gt 0 || $CRITICAL_VULN_COUNT -gt 0 ]]; then
              echo "::error::Found $CRITICAL_VULN_COUNT critical and $HIGH_VULN_COUNT high severity vulnerabilities"
              exit 1
            fi
          fi

      - name: Run Semgrep for JavaScript/TypeScript
        working-directory: euxis-web
        run: |
          # Install semgrep
          pip install semgrep==1.52.0
          semgrep --config=auto --json --output=semgrep-js-report.json src/ || true
          if [[ -f semgrep-js-report.json ]]; then
            echo "::group::Semgrep JavaScript/TypeScript Findings"
            cat semgrep-js-report.json | jq -r '.results[]? | "🔍 \(.path):\(.start.line) [\(.check_id)] \(.extra.message)"'
            echo "::endgroup::"
          fi

      - name: Upload Node.js security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nodejs-security-reports
          path: |
            euxis-web/npm-audit.json
            euxis-web/semgrep-js-report.json
          retention-days: 30

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [python-security, nodejs-security]
    if: always()

    steps:
      - name: Download all security reports
        uses: actions/download-artifact@v4
        with:
          path: security-reports

      - name: Generate security summary
        run: |
          echo "# 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status | Critical | High | Medium | Low |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|---------|----------|------|---------|-----|" >> $GITHUB_STEP_SUMMARY

          # Process Python security reports
          for report_dir in security-reports/security-reports-*/; do
            if [[ -d "$report_dir" ]]; then
              module=$(basename "$report_dir" | sed 's/security-reports-//')
              critical=0
              high=0
              medium=0
              low=0
              status="✅ PASS"

              # Count vulnerabilities from all sources
              if [[ -f "$report_dir/safety-report.json" ]]; then
                critical=$((critical + $(cat "$report_dir/safety-report.json" | jq '.vulnerabilities[]? | select(.vulnerability.severity == "critical")' | jq -s length 2>/dev/null || echo 0)))
                high=$((high + $(cat "$report_dir/safety-report.json" | jq '.vulnerabilities[]? | select(.vulnerability.severity == "high")' | jq -s length 2>/dev/null || echo 0)))
              fi

              if [[ $critical -gt 0 || $high -gt 0 ]]; then
                status="❌ FAIL"
              fi

              echo "| $module | $status | $critical | $high | $medium | $low |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          # Process Node.js security reports
          if [[ -d "security-reports/nodejs-security-reports" ]]; then
            critical=0
            high=0
            if [[ -f "security-reports/nodejs-security-reports/npm-audit.json" ]]; then
              critical=$(cat "security-reports/nodejs-security-reports/npm-audit.json" | jq '.metadata.vulnerabilities.critical // 0' 2>/dev/null || echo 0)
              high=$(cat "security-reports/nodejs-security-reports/npm-audit.json" | jq '.metadata.vulnerabilities.high // 0' 2>/dev/null || echo 0)
            fi

            status="✅ PASS"
            if [[ $critical -gt 0 || $high -gt 0 ]]; then
              status="❌ FAIL"
            fi

            echo "| euxis-web (Node.js) | $status | $critical | $high | - | - |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scan completed at:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow:** ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY