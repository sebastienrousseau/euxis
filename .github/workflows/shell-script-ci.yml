name: Shell Script CI Pipeline

on:
  push:
    branches: [ main, feat/*, release/* ]
  pull_request:
    branches: [ main ]
  schedule:
    # Nightly at 2 AM UTC for ShellCheck updates and bash nightly testing
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # SLO enforcement timeouts
  SHELLCHECK_SLO: 5
  TESTS_SLO: 60
  # Fail fast on any shell script issues
  SHELL_STRICT_MODE: true

jobs:
  # ========================================
  # SHELL LINTING & FORMATTING (Zero Tolerance)
  # ========================================
  shell-quality-gate:
    name: Shell Quality Gate
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            setup_script: |
              sudo apt-get update
              sudo apt-get install -y shellcheck
              sudo wget -O /usr/local/cli/bin/shfmt https://github.com/mvdan/sh/releases/download/v3.8.0/shfmt_v3.8.0_linux_amd64
              sudo chmod +x /usr/local/cli/bin/shfmt
          - os: macos-latest
            setup_script: |
              brew install shellcheck shfmt

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install shell tools
        run: ${{ matrix.setup_script }}

      - name: Verify shell tools
        run: |
          echo "=== Verifying tool versions ==="
          shellcheck --version
          shfmt --version
          echo "ShellCheck SLO: ${SHELLCHECK_SLO}s"

      - name: Find all shell scripts
        run: |
          echo "=== Discovering shell scripts ==="
          # Find .sh files
          find . -name "*.sh" -type f > shell_scripts.list
          # Find shebang-detected scripts
          find . -type f -exec grep -l "^#!/cli/bin/bash\|^#!/cli/bin/sh\|^#!/usr/bin/env bash" {} \; 2>/dev/null >> shell_scripts.list
          # Remove duplicates and exclude venv/build dirs
          sort shell_scripts.list | uniq | grep -v -E "(\.venv/|venv/|build/|dist/|__pycache__/)" > shell_scripts_final.list
          echo "Found $(wc -l < shell_scripts_final.list) shell scripts:"
          cat shell_scripts_final.list

      - name: Verify set -euo pipefail presence
        run: |
          echo "=== Checking for strict error handling ==="
          missing_strict=0
          while IFS= read -r script; do
            if [[ -f "$script" ]]; then
              # Skip library files that are sourced, they may not need strict mode
              if [[ "$script" =~ /lib/ ]]; then
                if ! grep -q "set -euo pipefail\|set -e" "$script"; then
                  echo "WARNING: $script lacks error handling (library file - acceptable)"
                fi
              else
                if ! grep -q "set -euo pipefail" "$script"; then
                  echo "ERROR: $script lacks 'set -euo pipefail'"
                  ((missing_strict++))
                fi
              fi
            fi
          done < shell_scripts_final.list

          if [[ $missing_strict -gt 0 ]]; then
            echo "FAILED: $missing_strict scripts lack proper error handling"
            exit 1
          fi
          echo "SUCCESS: All executable scripts have proper error handling"

      - name: ShellCheck analysis (SLO enforced)
        run: |
          echo "=== Running ShellCheck with SLO enforcement ==="
          start_time=$(date +%s)
          failed_scripts=0

          while IFS= read -r script; do
            if [[ -f "$script" ]]; then
              echo "Checking: $script"
              # Use -S error to treat all warnings as errors, -o all for all optional checks
              if ! shellcheck -S error -o all "$script"; then
                echo "FAILED: ShellCheck errors in $script"
                ((failed_scripts++))
              fi
            fi
          done < shell_scripts_final.list

          end_time=$(date +%s)
          duration=$((end_time - start_time))

          echo "ShellCheck completed in ${duration}s (SLO: ${SHELLCHECK_SLO}s)"

          if [[ $duration -gt $SHELLCHECK_SLO ]]; then
            echo "SLO VIOLATION: ShellCheck took ${duration}s, exceeding SLO of ${SHELLCHECK_SLO}s"
            exit 1
          fi

          if [[ $failed_scripts -gt 0 ]]; then
            echo "QUALITY GATE FAILED: $failed_scripts scripts have ShellCheck errors"
            exit 1
          fi

          echo "SUCCESS: All scripts pass ShellCheck analysis within SLO"

      - name: Format verification with shfmt
        run: |
          echo "=== Verifying shell script formatting ==="
          format_failures=0

          while IFS= read -r script; do
            if [[ -f "$script" ]]; then
              echo "Checking format: $script"
              # Use shfmt with: indent=2, binary-next-line, case-indent, space-redirects
              if ! shfmt -i 2 -bn -ci -sr -d "$script"; then
                echo "FORMAT ERROR: $script is not properly formatted"
                echo "Run: shfmt -i 2 -bn -ci -sr -w $script"
                ((format_failures++))
              fi
            fi
          done < shell_scripts_final.list

          if [[ $format_failures -gt 0 ]]; then
            echo "FORMAT GATE FAILED: $format_failures scripts are improperly formatted"
            exit 1
          fi

          echo "SUCCESS: All scripts are properly formatted"

      - name: Check executable permissions
        run: |
          echo "=== Verifying executable permissions ==="
          permission_issues=0

          while IFS= read -r script; do
            if [[ -f "$script" ]]; then
              # Scripts with shebangs should be executable
              if grep -q "^#!/" "$script"; then
                if [[ ! -x "$script" ]]; then
                  echo "PERMISSION ERROR: $script has shebang but is not executable"
                  ((permission_issues++))
                fi
              fi
            fi
          done < shell_scripts_final.list

          if [[ $permission_issues -gt 0 ]]; then
            echo "PERMISSION GATE FAILED: $permission_issues scripts have incorrect permissions"
            exit 1
          fi

          echo "SUCCESS: All scripts have correct permissions"

  # ========================================
  # SECRETS & SECURITY SCANNING
  # ========================================
  shell-security-scan:
    name: Shell Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for comprehensive scanning

      - name: Install security scanning tools
        run: |
          # Install gitleaks for secret detection
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.0/gitleaks_8.18.0_linux_x64.tar.gz | tar -xz
          sudo mv gitleaks /usr/local/cli/bin/

          # Install trufflehog as backup
          curl -sSfL https://github.com/trufflesecurity/trufflehog/releases/download/v3.63.2/trufflehog_3.63.2_linux_amd64.tar.gz | tar -xz
          sudo mv trufflehog /usr/local/cli/bin/

      - name: Scan for hardcoded secrets (gitleaks)
        run: |
          echo "=== Scanning for hardcoded secrets ==="
          if ! gitleaks detect --source . --verbose; then
            echo "SECRET DETECTION FAILED: Hardcoded secrets found"
            exit 1
          fi
          echo "SUCCESS: No hardcoded secrets detected"

      - name: Additional secret scan (trufflehog)
        run: |
          echo "=== Additional secret scanning with trufflehog ==="
          if ! trufflehog filesystem . --only-verified=false --json > trufflehog_report.json; then
            if [[ -s trufflehog_report.json ]]; then
              echo "TRUFFLEHOG FINDINGS:"
              cat trufflehog_report.json
              echo "Review findings above for false positives"
            fi
          fi

      - name: Shell-specific security patterns
        run: |
          echo "=== Checking for insecure shell patterns ==="
          security_issues=0

          # Check for dangerous patterns in shell scripts
          find . -name "*.sh" -type f -not -path "./.venv/*" -not -path "./venv/*" | while IFS= read -r script; do
            # Check for eval usage (dangerous)
            if grep -n "eval\s*\$" "$script"; then
              echo "SECURITY: Dangerous eval usage in $script"
              ((security_issues++))
            fi

            # Check for unquoted variables in dangerous contexts
            if grep -n '\$[A-Za-z_][A-Za-z0-9_]*[^"'"'"']' "$script" | grep -v "set \-" | head -5; then
              echo "WARNING: Potential unquoted variables in $script (review manually)"
            fi

            # Check for curl/wget piped to shell
            if grep -n "curl.*|.*sh\|wget.*|.*sh" "$script"; then
              echo "SECURITY: Dangerous pipe-to-shell pattern in $script"
              ((security_issues++))
            fi
          done

          if [[ $security_issues -gt 0 ]]; then
            echo "SECURITY GATE FAILED: $security_issues security issues found"
            exit 1
          fi

          echo "SUCCESS: No critical security patterns detected"

  # ========================================
  # SHELL SCRIPT TESTING WITH BATS
  # ========================================
  shell-testing:
    name: Shell Script Testing
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            setup_bats: |
              sudo apt-get update
              sudo apt-get install -y bats
          - os: macos-latest
            setup_bats: |
              brew install bats-core

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install bats testing framework
        run: ${{ matrix.setup_bats }}

      - name: Verify bats installation
        run: |
          bats --version
          echo "Test SLO: ${TESTS_SLO}s"

      - name: Run comprehensive shell tests (SLO enforced)
        run: |
          echo "=== Running shell script test suite ==="

          # Check if test runner exists
          if [[ ! -f "tests/run_shell_tests.sh" ]]; then
            echo "WARNING: tests/run_shell_tests.sh not found, running basic tests"
            exit 0
          fi

          start_time=$(date +%s)

          # Make test runner executable and run with timeout
          chmod +x tests/run_shell_tests.sh

          if timeout ${TESTS_SLO}s tests/run_shell_tests.sh; then
            echo "SUCCESS: Shell tests completed successfully"
          else
            exit_code=$?
            if [[ $exit_code -eq 124 ]]; then
              echo "SLO VIOLATION: Tests exceeded ${TESTS_SLO}s timeout"
              exit 1
            else
              echo "TEST FAILURE: Shell tests failed with exit code $exit_code"
              exit 1
            fi
          fi

          end_time=$(date +%s)
          duration=$((end_time - start_time))
          echo "Tests completed in ${duration}s (SLO: ${TESTS_SLO}s)"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shell-test-results-${{ matrix.os }}
          path: |
            tests/coverage/shell/
            tests/coverage/shell/*.tap
            tests/coverage/shell/shell_test_report.md
          retention-days: 1

  # ========================================
  # ALPINE LINUX TESTING (BusyBox)
  # ========================================
  alpine-compatibility:
    name: Alpine Linux Compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test Alpine/BusyBox compatibility
        run: |
          echo "=== Testing Alpine Linux/BusyBox compatibility ==="

          # Run critical shell scripts in Alpine container
          docker run --rm -v "$PWD:/workspace" alpine:latest sh -c '
            apk add --no-cache bash curl jq
            cd /workspace

            # Test basic functionality of key scripts
            if [ -f "setup.sh" ]; then
              echo "Testing setup.sh syntax..."
              sh -n setup.sh || exit 1
            fi

            # Test critical library functions load without errors
            for lib in core/lib/*.sh; do
              if [ -f "$lib" ]; then
                echo "Testing $lib syntax..."
                sh -n "$lib" || exit 1
              fi
            done

            echo "SUCCESS: All scripts compatible with Alpine/BusyBox"
          '

  # ========================================
  # NIGHTLY MAINTENANCE (Updates & Extended Testing)
  # ========================================
  nightly-maintenance:
    name: Nightly Maintenance
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'schedule'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update ShellCheck
        run: |
          echo "=== Checking for ShellCheck updates ==="
          current_version=$(shellcheck --version | grep version: | awk '{print $2}')
          echo "Current ShellCheck version: $current_version"

          # Check latest release
          latest_version=$(curl -s https://api.github.com/repos/koalaman/shellcheck/releases/latest | jq -r .tag_name)
          echo "Latest ShellCheck version: $latest_version"

          if [[ "$current_version" != "${latest_version#v}" ]]; then
            echo "ShellCheck update available: $current_version -> ${latest_version#v}"
            # Install latest version
            wget -O- https://github.com/koalaman/shellcheck/releases/download/$latest_version/shellcheck-$latest_version.linux.x86_64.tar.xz | tar -xJ
            sudo cp shellcheck-$latest_version/shellcheck /usr/local/cli/bin/
          else
            echo "ShellCheck is up to date"
          fi

      - name: Extended bash testing
        run: |
          echo "=== Running extended bash compatibility tests ==="

          # Test scripts with different bash versions/modes
          for script in $(find . -name "*.sh" -type f | head -10); do
            echo "Testing $script with bash --posix"
            if ! bash --posix -n "$script"; then
              echo "WARNING: $script may not be POSIX compatible"
            fi
          done

      - name: Performance benchmarking
        run: |
          echo "=== Running shell script performance benchmarks ==="

          if [[ -f "tests/run_shell_tests.sh" ]]; then
            echo "Benchmarking test suite performance..."
            time tests/run_shell_tests.sh > /tmp/benchmark.log 2>&1 || true
            echo "Test suite benchmark completed"
          fi

  # ========================================
  # CONSOLIDATION GATE
  # ========================================
  shell-ci-gate:
    name: Shell CI Gate
    runs-on: ubuntu-latest
    needs: [shell-quality-gate, shell-security-scan, shell-testing, alpine-compatibility]
    if: always() && github.event_name != 'schedule'

    steps:
      - name: Evaluate gate status
        run: |
          echo "=== SHELL CI GATE EVALUATION ==="
          echo "Quality Gate: ${{ needs.shell-quality-gate.result }}"
          echo "Security Scan: ${{ needs.shell-security-scan.result }}"
          echo "Shell Testing: ${{ needs.shell-testing.result }}"
          echo "Alpine Compatibility: ${{ needs.alpine-compatibility.result }}"

          # All gates must pass
          if [[ "${{ needs.shell-quality-gate.result }}" == "success" ]] && \
             [[ "${{ needs.shell-security-scan.result }}" == "success" ]] && \
             [[ "${{ needs.shell-testing.result }}" == "success" ]] && \
             [[ "${{ needs.alpine-compatibility.result }}" == "success" ]]; then
            echo "✅ SHELL CI GATE PASSED - ALL CHECKS SUCCESSFUL"
            echo "Shell script quality, security, and functionality verified across platforms"
          else
            echo "❌ SHELL CI GATE FAILED - One or more checks failed"
            exit 1
          fi

      - name: Generate shell CI report
        run: |
          cat > shell-ci-report.md << 'EOF'
          # Shell Script CI Report

          Generated: $(date -u)
          Workflow: Shell Script CI Pipeline

          ## Gate Results
          - **Quality Gate:** ${{ needs.shell-quality-gate.result }}
          - **Security Scan:** ${{ needs.shell-security-scan.result }}
          - **Testing:** ${{ needs.shell-testing.result }}
          - **Alpine Compatibility:** ${{ needs.alpine-compatibility.result }}

          ## Quality Standards Enforced
          - ✅ ShellCheck analysis (all warnings as errors)
          - ✅ Format verification (shfmt)
          - ✅ Strict error handling verification
          - ✅ Executable permissions check
          - ✅ Secret scanning (gitleaks + trufflehog)
          - ✅ Security pattern analysis
          - ✅ Comprehensive bats testing
          - ✅ Multi-platform compatibility (Ubuntu, macOS, Alpine)
          - ✅ SLO enforcement (ShellCheck <5s, tests <60s)

          ## Platform Coverage
          - Ubuntu Latest (primary)
          - macOS Latest (compatibility)
          - Alpine Linux (BusyBox compatibility)
          EOF

      - name: Upload CI report
        uses: actions/upload-artifact@v4
        with:
          name: shell-ci-report
          path: shell-ci-report.md
          retention-days: 1