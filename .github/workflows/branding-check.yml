name: Branding Compliance Check

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]

jobs:
  branding-check:
    name: Verify Branding Signature
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check signature file exists
        run: |
          if [[ ! -f "euxis-data/config/branding/signature.txt" ]]; then
            echo "::error::Missing branding signature file"
            exit 1
          fi
          echo "Signature file present"

      - name: Verify commit messages carry branding
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [[ -z "$LAST_TAG" ]]; then
            echo "No tags found — skipping commit branding check"
            exit 0
          fi

          FAILURES=0
          while IFS= read -r hash; do
            AUTHOR=$(git log -1 --format="%an" "$hash")
            if echo "$AUTHOR" | grep -qi "dependabot"; then
              continue
            fi
            MSG=$(git log -1 --format="%B" "$hash")
            if ! echo "$MSG" | grep -qi "Engineered with.*Euxis"; then
              SHORT=$(git log -1 --format="%h %s" "$hash")
              echo "::warning::Missing branding footer: $SHORT"
              FAILURES=$((FAILURES + 1))
            fi
          done < <(git log --format="%H" "${LAST_TAG}..HEAD")

          if [[ $FAILURES -gt 0 ]]; then
            echo "::error::$FAILURES commit(s) missing branding signature"
            exit 1
          fi
          echo "All commits carry branding signature"

      - name: Verify PR description branding
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_BODY=$(gh pr view "${{ github.event.pull_request.number }}" --json body -q '.body' 2>/dev/null || echo "")
          if [[ -z "$PR_BODY" ]]; then
            echo "::warning::PR body is empty"
            exit 0
          fi
          if ! echo "$PR_BODY" | grep -qF "Sebastien Rousseau" || ! echo "$PR_BODY" | grep -qF "euxis.co"; then
            echo "::error::PR description missing branding signature"
            exit 1
          fi
          echo "PR branding signature verified"
