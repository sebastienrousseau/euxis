name: Branding Compliance

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  check-branding:
    name: Verify Euxis Signature
    runs-on: ubuntu-latest
    steps:
      - name: Check PR description for branding signature
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const requiredSignatures = [
              'Sebastien Rousseau',
              'Euxis',
              'euxis.co'
            ];

            const missing = requiredSignatures.filter(sig => !body.includes(sig));

            if (missing.length > 0) {
              core.setFailed(
                `PR description is missing required branding signature.\n` +
                `Missing: ${missing.join(', ')}\n\n` +
                `Every PR must include the Euxis branding footer:\n` +
                `> Designed by **Sebastien Rousseau**\n` +
                `> Engineered with **[Euxis](https://euxis.co/)** — Enterprise Unified eXecution Intelligence System`
              );
            } else {
              console.log('Branding signature verified in PR description.');
            }

      - name: Check commits for branding signature
        uses: actions/github-script@v7
        with:
          script: |
            const commits = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const unsigned = commits.data.filter(
              c => !c.commit.message.includes('Engineered with Euxis')
            );

            if (unsigned.length > 0) {
              const list = unsigned.map(c => `  - ${c.sha.slice(0, 7)}: ${c.commit.message.split('\n')[0]}`).join('\n');
              core.setFailed(
                `${unsigned.length} commit(s) missing branding signature:\n${list}\n\n` +
                `Install the Euxis commit hook: euxis-hooks install`
              );
            } else {
              console.log(`All ${commits.data.length} commits carry branding signature.`);
            }
