version: '3.8'

# Multi-Platform Docker Compose for Euxis
# Supports AMD64 and ARM64 architectures

services:
  # Core Euxis Agent Framework
  euxis-agents:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.multi-platform
      platforms:
        - linux/amd64
        - linux/arm64
      args:
        TARGETARCH: ${TARGETARCH:-amd64}
    image: euxis/agents:${VERSION:-v0.0.6}-multi
    container_name: euxis-fleet-multi
    volumes:
      - ../:/app/.euxis/workspace:ro  # Mount workspace for development
      - euxis-logs:/app/.euxis/logs   # Persistent logs
      - euxis-cortex:/app/.euxis/cortex_db  # Persistent memory
    environment:
      - EUXIS_VERSION=${VERSION:-v0.0.6}
      - EUXIS_PLATFORM=${TARGETARCH:-amd64}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CHROMA_HOST=cortex-db
      - PYTHONUNBUFFERED=1
    depends_on:
      cortex-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - euxis-network
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 /app/.euxis/bin/euxis --help >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Cortex Vector Database
  cortex-db:
    image: chromadb/chroma:latest
    container_name: cortex-db-multi
    volumes:
      - cortex-data:/chroma/chroma
    ports:
      - "${CHROMA_PORT:-8000}:8000"
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
    restart: unless-stopped
    networks:
      - euxis-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Platform verification service
  euxis-verification:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.multi-platform
      target: application
      args:
        TARGETARCH: ${TARGETARCH:-amd64}
    image: euxis/verification:${VERSION:-v0.0.6}
    container_name: euxis-verification
    volumes:
      - ../:/app/.euxis/workspace:ro
    environment:
      - EUXIS_VERSION=${VERSION:-v0.0.6}
      - EUXIS_PLATFORM=${TARGETARCH:-amd64}
    command: ["/app/.euxis/bin/euxis-cross-platform-verify", "--local-only"]
    networks:
      - euxis-network
    profiles:
      - verification

volumes:
  euxis-logs:
    driver: local
  euxis-cortex:
    driver: local
  cortex-data:
    driver: local

networks:
  euxis-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16