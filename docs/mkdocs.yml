site_name: Euxis Documentation
site_url: https://docs.euxis.co
repo_url: https://github.com/euxis/data

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - search.suggest

nav:
  - Home: index.md
  - Quick Start: quick-start.md
  - User Guide: user-guide.md
  - Architecture: architecture.md

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
