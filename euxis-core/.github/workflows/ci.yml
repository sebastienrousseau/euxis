name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHONDONTWRITEBYTECODE: 1
  PYTHONUNBUFFERED: 1

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install safety==3.0.1 bandit[toml]==1.7.5 pip-audit==2.6.3

      - name: Install project dependencies
        run: |
          pip install -e .[dev]

      - name: Run dependency vulnerability scan
        run: |
          # Generate requirements for safety
          pip freeze > requirements-temp.txt

          # Check for known vulnerabilities
          echo "::group::Dependency Vulnerability Scan"
          safety check -r requirements-temp.txt --json --output safety-report.json || true
          if [[ -f safety-report.json ]]; then
            VULN_COUNT=$(cat safety-report.json | jq '.vulnerabilities | length')
            if [[ $VULN_COUNT -gt 0 ]]; then
              echo "::warning::Found $VULN_COUNT dependency vulnerabilities"
              cat safety-report.json | jq -r '.vulnerabilities[]? | "⚠️ \(.package_name) \(.installed_version): \(.vulnerability.advisory)"'
            else
              echo "✅ No dependency vulnerabilities found"
            fi
          fi
          echo "::endgroup::"

          # Alternative scanning with pip-audit
          echo "::group::Pip-Audit Scan"
          pip-audit --desc --format=json --output=pip-audit.json . || true
          if [[ -f pip-audit.json ]]; then
            cat pip-audit.json | jq -r '.vulnerabilities[]? | "🔍 \(.package) \(.installed_version): \(.description)"'
          fi
          echo "::endgroup::"

      - name: Run code security analysis
        run: |
          if [[ -d src ]]; then
            echo "::group::Bandit Security Analysis"
            bandit -r src/ -f json -o bandit-report.json || true
            if [[ -f bandit-report.json ]]; then
              cat bandit-report.json | jq -r '.results[]? | "⚠️ \(.filename):\(.line_number) [\(.test_id)] \(.issue_text)"'
            fi
            echo "::endgroup::"
          fi

      - name: Upload security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-euxis-core
          path: |
            safety-report.json
            pip-audit.json
            bandit-report.json
          retention-days: 7

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: security
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint with ruff
        run: ruff check .

      - name: Format check with black
        run: black --check .

      - name: Type check with mypy
        run: |
          pip install mypy
          mypy src/ --ignore-missing-imports || echo "::warning::Type checking found issues"

      - name: Run tests
        run: pytest -v --cov=src --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [security, test]
    if: always()

    steps:
      - name: Download security reports
        uses: actions/download-artifact@v4
        with:
          name: security-reports-euxis-core

      - name: Evaluate security posture
        run: |
          echo "# 🔒 Security Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          FAIL_BUILD=false

          # Check Safety results
          if [[ -f safety-report.json ]]; then
            CRITICAL_VULNS=$(cat safety-report.json | jq '.vulnerabilities[]? | select(.vulnerability.severity == "high" or .vulnerability.severity == "critical")' | jq -s length)
            if [[ $CRITICAL_VULNS -gt 0 ]]; then
              echo "❌ **SECURITY GATE FAILED**: $CRITICAL_VULNS critical/high severity vulnerabilities found" >> $GITHUB_STEP_SUMMARY
              FAIL_BUILD=true
            else
              echo "✅ **Dependency Scan**: No critical vulnerabilities" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          # Check Bandit results
          if [[ -f bandit-report.json ]]; then
            HIGH_ISSUES=$(cat bandit-report.json | jq '.results[]? | select(.issue_severity == "HIGH" or .issue_severity == "CRITICAL")' | jq -s length)
            if [[ $HIGH_ISSUES -gt 0 ]]; then
              echo "⚠️ **Code Analysis**: $HIGH_ISSUES high/critical security issues found - review required" >> $GITHUB_STEP_SUMMARY
            else
              echo "✅ **Code Analysis**: No critical security issues" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          if [[ "$FAIL_BUILD" == "true" ]]; then
            echo "::error::Security gate failed - critical vulnerabilities must be resolved"
            exit 1
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Security scan completed:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
