[package]
name = "euxis_dispatch"
version = "0.1.0"
edition = "2021"
description = "High-performance Rust dispatch engine replacing the euxis_core.py GIL bottleneck."
authors = ["Sebastien Rousseau <sebastian.rousseau@gmail.com>"]
license = "AGPL-3.0-or-later"

[dependencies]
tokio = { version = "1.37", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rusqlite = "0.31"
anyhow = "1.0"
tracing = "0.1"
tracing-subscriber = "0.3"
extism = "1.0.0"

[profile.release]
lto = true
codegen-units = 1
opt-level = 3
panic = "abort"
